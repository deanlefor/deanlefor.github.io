<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinochle Score Keeper</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Lucide icons as inline SVG components
        const Trash2 = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/>
            </svg>
        );

        const RotateCcw = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
            </svg>
        );

        const Plus = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 5v14M5 12h14"/>
            </svg>
        );

        function PinochleScorer() {
            const [players, setPlayers] = useState([
                { name: 'Player 1', score: 0 },
                { name: 'Player 2', score: 0 },
                { name: 'Player 3', score: 0 }
            ]);
            
            const [currentRound, setCurrentRound] = useState({
                bidder: null,
                bid: '',
                trump: '',
                bidMade: true,
                meld: [0, 0, 0],
                tricks: [null, null, null]
            });
            
            const [history, setHistory] = useState([]);
            const [editingPlayer, setEditingPlayer] = useState(null);
            const [winningScore, setWinningScore] = useState(150);
            const [currentDealer, setCurrentDealer] = useState(0);
            const [sessionStats, setSessionStats] = useState({
                winTally: [0, 0, 0],
                recordedWinner: null
            });
            
            const trumpSuits = ['♠ Spades', '♥ Hearts', '♣ Clubs', '♦ Diamonds'];

            // Load data from localStorage on mount
            useEffect(() => {
                const saved = localStorage.getItem('pinochleGame');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        setPlayers(data.players || players);
                        setHistory(data.history || []);
                        setWinningScore(data.winningScore || 150);
                        setCurrentDealer(data.currentDealer ?? 0);
                    } catch (error) {
                        console.error('Could not load saved game data.', error);
                    }
                }

                const savedSession = sessionStorage.getItem('pinochleSession');
                if (savedSession) {
                    try {
                        const data = JSON.parse(savedSession);
                        setSessionStats({
                            winTally: Array.isArray(data.winTally) && data.winTally.length === 3 ? data.winTally : [0, 0, 0],
                            recordedWinner: Number.isInteger(data.recordedWinner) ? data.recordedWinner : null
                        });
                    } catch (error) {
                        console.error('Could not load session win tally.', error);
                    }
                }
            }, []);

            // Save data whenever it changes
            useEffect(() => {
                localStorage.setItem('pinochleGame', JSON.stringify({
                    players,
                    history,
                    winningScore,
                    currentDealer
                }));
            }, [players, history, winningScore, currentDealer]);

            useEffect(() => {
                sessionStorage.setItem('pinochleSession', JSON.stringify(sessionStats));
            }, [sessionStats]);

            const resetCurrentRound = () => {
                setCurrentRound({
                    bidder: null,
                    bid: '',
                    trump: '',
                    bidMade: true,
                    meld: [0, 0, 0],
                    tricks: [null, null, null]
                });
            };

            const updatePlayerName = (index, newName) => {
                const newPlayers = [...players];
                newPlayers[index].name = newName;
                setPlayers(newPlayers);
            };

            const finishEditingPlayer = () => {
                setEditingPlayer(null);
            };

            const updateMeld = (index, value) => {
                const newMeld = [...currentRound.meld];
                newMeld[index] = parseInt(value) || 0;
                setCurrentRound({ ...currentRound, meld: newMeld });
            };

            const updateTricks = (index, value) => {
                const newTricks = [...currentRound.tricks];
                // Handle empty string as null, but allow 0 as a valid number
                const parsedValue = value === '' ? null : parseInt(value, 10);
                newTricks[index] = parsedValue;
                
                // Auto-calculate third player's tricks if two are entered (including 0)
                const enteredValues = newTricks.map((t, i) => ({ index: i, value: t })).filter(item => item.value !== null);
                
                if (enteredValues.length === 2) {
                    // Find the empty index
                    const emptyIndex = newTricks.findIndex(t => t === null);
                    if (emptyIndex !== -1) {
                        const sum = enteredValues.reduce((acc, item) => acc + item.value, 0);
                        newTricks[emptyIndex] = Math.max(0, 25 - sum);
                    }
                }
                
                setCurrentRound({ ...currentRound, tricks: newTricks });
            };

            const calculatePlayerTotal = (round, index) => {
                const tricks = round.tricks[index];
                const hasTricksValue = tricks !== null;
                const shutoutPlayerIndex = round.tricks.findIndex(trickTotal => trickTotal === 25);

                if (!round.bidMade && index === round.bidder) {
                    return -(parseInt(round.bid, 10) || 0);
                }

                if (shutoutPlayerIndex !== -1) {
                    if (index === shutoutPlayerIndex) {
                        return round.meld[index] + (tricks ?? 0);
                    }

                    return tricks ?? 0;
                }

                if (hasTricksValue && tricks === 0) {
                    return 0;
                }

                return round.meld[index] + (tricks ?? 0);
            };

            const submitRound = () => {
                if (!currentRound.bidder && currentRound.bidder !== 0) {
                    alert('Please select who took the bid');
                    return;
                }

                const filledTricks = currentRound.tricks.filter(t => t !== null);
                if (filledTricks.length === 3) {
                    const tricksSum = filledTricks.reduce((a, b) => a + b, 0);
                    if (tricksSum !== 25) {
                        alert(`Tricks must total 25 (currently ${tricksSum}). Please correct before submitting.`);
                        return;
                    }
                }

                const totalScores = currentRound.meld.map((_, index) => (
                    calculatePlayerTotal(currentRound, index)
                ));
                
                const newPlayers = players.map((player, index) => ({
                    ...player,
                    score: player.score + totalScores[index]
                }));

                const winnerIndex = newPlayers.findIndex(player => player.score >= winningScore);
                
                setPlayers(newPlayers);
                setHistory([...history, { 
                    round: history.length + 1, 
                    dealer: currentDealer,
                    bidder: currentRound.bidder,
                    bid: currentRound.bid,
                    trump: currentRound.trump,
                    bidMade: currentRound.bidMade,
                    meld: [...currentRound.meld],
                    tricks: [...currentRound.tricks],
                    totals: totalScores
                }]);
                
                // Rotate dealer to next player
                setCurrentDealer((currentDealer + 1) % 3);

                if (winnerIndex !== -1 && sessionStats.recordedWinner === null) {
                    setSessionStats(prev => {
                        const nextTally = [...prev.winTally];
                        nextTally[winnerIndex] += 1;
                        return {
                            winTally: nextTally,
                            recordedWinner: winnerIndex
                        };
                    });
                }
                
                resetCurrentRound();
            };

            const undoLastRound = () => {
                if (history.length === 0) return;
                
                const lastRound = history[history.length - 1];
                const newPlayers = players.map((player, index) => ({
                    ...player,
                    score: player.score - lastRound.totals[index]
                }));
                
                setPlayers(newPlayers);
                setHistory(history.slice(0, -1));
                
                // Restore previous dealer
                setCurrentDealer(lastRound.dealer);
                setCurrentRound({
                    bidder: lastRound.bidder ?? null,
                    bid: lastRound.bid ?? '',
                    trump: lastRound.trump ?? '',
                    bidMade: lastRound.bidMade !== false,
                    meld: [...lastRound.meld],
                    tricks: [...lastRound.tricks]
                });

                if (
                    sessionStats.recordedWinner !== null &&
                    (newPlayers[sessionStats.recordedWinner]?.score ?? 0) < winningScore
                ) {
                    setSessionStats(prev => {
                        if (prev.recordedWinner === null) {
                            return prev;
                        }

                        const nextTally = [...prev.winTally];
                        nextTally[prev.recordedWinner] = Math.max(0, nextTally[prev.recordedWinner] - 1);
                        return {
                            winTally: nextTally,
                            recordedWinner: null
                        };
                    });
                }
            };

            const resetGame = () => {
                if (window.confirm('Reset the entire game? This cannot be undone.')) {
                    setPlayers(players.map(p => ({ ...p, score: 0 })));
                    resetCurrentRound();
                    setHistory([]);
                    setCurrentDealer(0);
                    setSessionStats(prev => ({
                        ...prev,
                        recordedWinner: null
                    }));
                }
            };

            const winner = players.find(p => p.score >= winningScore);

            return (
                <div className="min-h-screen bg-gradient-to-br from-green-800 to-green-900 p-4">
                    <div className="max-w-[1600px] mx-auto">
                        {/* Header */}
                        <div className="bg-white rounded-lg shadow-lg p-6 mb-4">
                            <h1 className="text-3xl font-bold text-green-800 text-center mb-2">
                                Pinochle Score Keeper
                            </h1>
                            <div className="flex items-center justify-center gap-2 text-gray-600">
                                <span>Playing to:</span>
                                <input
                                    type="number"
                                    value={winningScore}
                                    onChange={(e) => setWinningScore(parseInt(e.target.value) || 150)}
                                    className="w-20 px-2 py-1 border border-gray-300 rounded text-center"
                                />
                                <span>points</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 lg:items-start">
                            <div className="flex flex-col gap-4 lg:max-h-[calc(100vh-10rem)] lg:overflow-y-auto lg:pr-1">
                                {/* Dealer Selection (only before first round) */}
                                {history.length === 0 && (
                                    <div className="bg-blue-50 border-2 border-blue-300 rounded-lg shadow-lg p-6">
                                        <h2 className="text-lg font-semibold text-gray-800 mb-3 text-center">
                                            Who is dealing first?
                                        </h2>
                                        <div className="grid grid-cols-3 gap-4">
                                            {players.map((player, index) => (
                                                <button
                                                    key={index}
                                                    onClick={() => setCurrentDealer(index)}
                                                    className={`py-3 px-4 rounded-lg font-semibold transition-all ${
                                                        currentDealer === index
                                                            ? 'bg-blue-600 text-white shadow-lg'
                                                            : 'bg-white text-gray-700 hover:bg-blue-100'
                                                    }`}
                                                >
                                                    {player.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Current Round Input */}
                                <div className="bg-white rounded-lg shadow-lg p-6">
                                    <h2 className="text-xl font-semibold text-gray-800 mb-4">
                                        Round {history.length + 1}
                                    </h2>
                                    
                                    {/* Bid Information */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 p-4 bg-gray-50 rounded-lg">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Who Took the Bid?
                                            </label>
                                            <select
                                                value={currentRound.bidder ?? ''}
                                                onChange={(e) => setCurrentRound({ ...currentRound, bidder: e.target.value === '' ? null : parseInt(e.target.value) })}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                                            >
                                                <option value="">Select bidder...</option>
                                                {players.map((player, index) => (
                                                    <option key={index} value={index}>{player.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Bid Amount
                                            </label>
                                            <input
                                                type="number"
                                                value={currentRound.bid}
                                                onChange={(e) => setCurrentRound({ ...currentRound, bid: e.target.value })}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                                                placeholder="e.g., 25"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Trump
                                            </label>
                                            <select
                                                value={currentRound.trump}
                                                onChange={(e) => setCurrentRound({ ...currentRound, trump: e.target.value })}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                                            >
                                                <option value="">Select trump...</option>
                                                {trumpSuits.map((suit) => (
                                                    <option key={suit} value={suit}>{suit}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    {/* Meld Scores */}
                                    <div className="mb-4">
                                        <h3 className="text-lg font-semibold text-gray-800 mb-3">Meld</h3>
                                        <div className="grid grid-cols-3 gap-4">
                                            {players.map((player, index) => (
                                                <div key={index}>
                                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                                        {player.name}
                                                    </label>
                                                    <input
                                                        type="number"
                                                        value={currentRound.meld[index] ?? ''}
                                                        onChange={(e) => updateMeld(index, e.target.value)}
                                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg text-center text-xl"
                                                        placeholder="0"
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Tricks Needed Calculator */}
                                    {currentRound.bidder !== null && currentRound.bid && currentRound.meld[currentRound.bidder] > 0 && (
                                        <div className="mb-4 p-4 bg-yellow-50 border-2 border-yellow-300 rounded-lg">
                                            <div className="text-center">
                                                <div className="text-sm font-medium text-gray-700 mb-1">
                                                    {players[currentRound.bidder]?.name} needs to take:
                                                </div>
                                                <div className="text-3xl font-bold text-yellow-700">
                                                    {Math.max(0, parseInt(currentRound.bid) - currentRound.meld[currentRound.bidder])} trick points
                                                </div>
                                                <div className="text-xs text-gray-600 mt-1">
                                                    (Bid: {currentRound.bid} - Meld: {currentRound.meld[currentRound.bidder]} = {parseInt(currentRound.bid) - currentRound.meld[currentRound.bidder]})
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Tricks Scores */}
                                    <div className="mb-4">
                                        <h3 className="text-lg font-semibold text-gray-800 mb-3">
                                            Tricks
                                            <span className="ml-2 text-xs text-gray-500 font-normal">(Enter 2 players, 3rd auto-calculates from 25)</span>
                                        </h3>
                                        <div className="grid grid-cols-3 gap-4">
                                            {players.map((player, index) => (
                                                <div key={index}>
                                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                                        {player.name}
                                                    </label>
                                                    <input
                                                        type="number"
                                                        value={currentRound.tricks[index] === null ? '' : currentRound.tricks[index]}
                                                        onChange={(e) => updateTricks(index, e.target.value)}
                                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg text-center text-xl"
                                                        placeholder="0"
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {/* Bid Made Checkbox */}
                                    <div className="mb-4 p-4 bg-gray-50 rounded-lg">
                                        <label className="flex items-center gap-3 cursor-pointer">
                                            <input
                                                type="checkbox"
                                                checked={currentRound.bidMade}
                                                onChange={(e) => setCurrentRound({ ...currentRound, bidMade: e.target.checked })}
                                                className="w-5 h-5 text-green-600 rounded"
                                            />
                                            <span className="text-sm font-medium text-gray-700">
                                                Bid Made? (Uncheck if bidder failed)
                                            </span>
                                        </label>
                                        {!currentRound.bidMade && (
                                            <div className="mt-2 text-sm text-red-600">
                                                ⚠️ Bidder will lose the bid amount, others get meld + tricks
                                            </div>
                                        )}
                                        <div className="mt-2 text-xs text-gray-600">
                                            Note: Any player with 0 tricks gets 0 points total (loses meld)
                                        </div>
                                        <div className="mt-1 text-xs text-gray-600">
                                            Shutout rule: Taking all 25 trick points means only that player keeps their meld.
                                        </div>
                                    </div>

                                    {/* Round Totals Preview */}
                                    <div className="mb-4 p-3 bg-blue-50 rounded-lg">
                                        <div className="grid grid-cols-3 gap-4 text-center">
                                            {players.map((player, index) => {
                                                const tricks = currentRound.tricks[index];
                                                const hasTricksValue = tricks !== null;
                                                const total = calculatePlayerTotal(currentRound, index);
                                                
                                                return (
                                                    <div key={index}>
                                                        <div className="text-sm text-gray-600">{player.name} Total</div>
                                                        <div className={`text-xl font-bold ${total < 0 ? 'text-red-600' : 'text-blue-700'}`}>
                                                            {total > 0 && '+'}{total}
                                                        </div>
                                                        {hasTricksValue && tricks === 0 && currentRound.meld[index] > 0 && (
                                                            <div className="text-xs text-red-600 mt-1">
                                                                (0 tricks = lose meld)
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <button
                                        onClick={submitRound}
                                        className="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 flex items-center justify-center gap-2"
                                    >
                                        <Plus size={20} />
                                        Add Round
                                    </button>
                                </div>
                            </div>

                            <div className="flex flex-col gap-4">
                                {/* Winner Banner */}
                                {winner && (
                                    <div className="bg-yellow-400 rounded-lg shadow-lg p-6 text-center">
                                        <h2 className="text-2xl font-bold text-gray-800">
                                            🎉 {winner.name} Wins! 🎉
                                        </h2>
                                        <p className="text-gray-700 mt-2">Final Score: {winner.score} points</p>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                    {players.map((player, index) => (
                                        <div key={index} className={`bg-white rounded-lg shadow-lg p-6 text-center ${currentDealer === index ? 'ring-4 ring-blue-400' : ''}`}>
                                            {editingPlayer === index ? (
                                                <input
                                                    type="text"
                                                    value={player.name}
                                                    onChange={(e) => updatePlayerName(index, e.target.value)}
                                                    onBlur={finishEditingPlayer}
                                                    onKeyDown={(e) => e.key === 'Enter' && finishEditingPlayer()}
                                                    className="text-xl font-semibold text-gray-800 border-b-2 border-green-600 text-center w-full mb-2"
                                                    autoFocus
                                                />
                                            ) : (
                                                <h3
                                                    onClick={() => setEditingPlayer(index)}
                                                    className="text-xl font-semibold text-gray-800 mb-2 cursor-pointer hover:text-green-600"
                                                >
                                                    {player.name}
                                                    {currentDealer === index && (
                                                        <span className="ml-2 text-blue-600 text-sm">🃏 Dealer</span>
                                                    )}
                                                </h3>
                                            )}
                                            <div className="text-sm text-gray-500 mb-3">
                                                Games won: <span className="font-semibold text-green-700">{sessionStats.winTally[index] || 0}</span>
                                            </div>
                                            <div className="text-4xl font-bold text-green-700">
                                                {player.score}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Game Controls */}
                                <div className="flex gap-4">
                                    <button
                                        onClick={undoLastRound}
                                        disabled={history.length === 0}
                                        className="flex-1 bg-yellow-500 text-white py-3 rounded-lg font-semibold hover:bg-yellow-600 disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                                    >
                                        <RotateCcw size={20} />
                                        Undo Last Round
                                    </button>
                                    <button
                                        onClick={resetGame}
                                        className="flex-1 bg-red-500 text-white py-3 rounded-lg font-semibold hover:bg-red-600 flex items-center justify-center gap-2"
                                    >
                                        <Trash2 size={20} />
                                        New Game
                                    </button>
                                </div>

                                {/* Score History */}
                                {history.length > 0 && (
                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <h2 className="text-xl font-semibold text-gray-800 mb-4">Score History</h2>
                                        <div className="overflow-auto lg:max-h-[calc(100vh-26rem)]">
                                            <table className="w-full text-sm">
                                                <thead>
                                                    <tr className="border-b-2 border-gray-300">
                                                        <th className="py-2 px-2 text-left">Round</th>
                                                        <th className="py-2 px-2 text-left">Dealer</th>
                                                        <th className="py-2 px-2 text-left">Bidder</th>
                                                        <th className="py-2 px-2 text-left">Bid</th>
                                                        <th className="py-2 px-2 text-left">Trump</th>
                                                        <th className="py-2 px-2 text-center">Made?</th>
                                                        {players.map((player, index) => (
                                                            <th key={index} className="py-2 px-2 text-center" colSpan="3">
                                                                {player.name}
                                                            </th>
                                                        ))}
                                                    </tr>
                                                    <tr className="border-b border-gray-200 text-xs text-gray-600">
                                                        <th></th>
                                                        <th></th>
                                                        <th></th>
                                                        <th></th>
                                                        <th></th>
                                                        <th></th>
                                                        {players.map((player, index) => (
                                                            <React.Fragment key={index}>
                                                                <th className="py-1 px-1">M</th>
                                                                <th className="py-1 px-1">T</th>
                                                                <th className="py-1 px-1 font-semibold">Tot</th>
                                                            </React.Fragment>
                                                        ))}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {history.map((round, roundIndex) => (
                                                        <tr key={roundIndex} className={`border-b border-gray-200 ${!round.bidMade ? 'bg-red-50' : ''}`}>
                                                            <td className="py-2 px-2 font-medium">{round.round}</td>
                                                            <td className="py-2 px-2">
                                                                {round.dealer !== null && round.dealer !== undefined ? players[round.dealer]?.name : '-'}
                                                            </td>
                                                            <td className="py-2 px-2">
                                                                {round.bidder !== null && round.bidder !== undefined ? players[round.bidder]?.name : '-'}
                                                            </td>
                                                            <td className="py-2 px-2">{round.bid || '-'}</td>
                                                            <td className="py-2 px-2">{round.trump || '-'}</td>
                                                            <td className="py-2 px-2 text-center">
                                                                {round.bidMade !== false ? '✓' : '✗'}
                                                            </td>
                                                            {players.map((player, playerIndex) => (
                                                                <React.Fragment key={playerIndex}>
                                                                    <td className="py-2 px-1 text-center text-gray-600">
                                                                        {round.meld[playerIndex]}
                                                                    </td>
                                                                    <td className="py-2 px-1 text-center text-gray-600">
                                                                        {round.tricks[playerIndex]}
                                                                    </td>
                                                                    <td className="py-2 px-1 text-center font-semibold">
                                                                        {round.totals[playerIndex] > 0 && '+'}{round.totals[playerIndex]}
                                                                    </td>
                                                                </React.Fragment>
                                                            ))}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PinochleScorer />);
    </script>
</body>
</html>
