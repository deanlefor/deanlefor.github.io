<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinochle Scorecard</title>
<link rel="stylesheet" href="score-stats.css">
<style>
*{box-sizing:border-box}
:root{
  color-scheme:light;
  --ink:#1f2420;
  --muted:#69736c;
  --paper:#f5f2eb;
  --panel:#fffdf8;
  --soft:#ebe4d8;
  --line:#d3cab9;
  --green:#2f684d;
  --green-dark:#214c38;
  --gold:#b8892f;
  --red:#a33b32;
  --blue:#2f5f8c;
  --shadow:0 12px 34px rgba(38,32,22,.1);
  --input:#fff;
  --button-bg:#fff;
  --button-hover:#948873;
  --on-accent:#fff;
  --focus:rgba(47,104,77,.12);
  --needed-bg:#fff8e8;
  --needed-line:rgba(184,137,47,.35);
  --needed-ink:#7d5a16;
  --message-bg:#fff1ef;
  --message-line:rgba(163,59,50,.25);
  --preview-bg:#fff;
  --winner-bg:#fff6df;
  --winner-line:rgba(184,137,47,.4);
  --winner-ink:#725111;
  --sheet-bg:#fff;
  --sheet-head-bg:#f8f5ee;
  --round-info-bg:#fbf8f1;
  --sheet-head-ink:#4a453d;
  --empty-bg:rgba(255,255,255,.45);
  --toast-bg:#191816;
  --toast-ink:#fff;
}
html.dark-mode{
  color-scheme:dark;
  --ink:#f2eee6;
  --muted:#c1b8aa;
  --paper:#15130f;
  --panel:#22201c;
  --soft:#2d2923;
  --line:#5b554b;
  --green:#6ea98f;
  --green-dark:#5b937a;
  --gold:#d7a94a;
  --red:#ef8177;
  --blue:#7fa2c3;
  --shadow:0 12px 34px rgba(0,0,0,.34);
  --input:#1b1a17;
  --button-bg:#22201c;
  --button-hover:#d0c6b6;
  --on-accent:#101510;
  --focus:rgba(110,169,143,.2);
  --needed-bg:#2d2618;
  --needed-line:rgba(215,169,74,.4);
  --needed-ink:#f0cf75;
  --message-bg:#34201f;
  --message-line:rgba(239,129,119,.35);
  --preview-bg:#1f1d19;
  --winner-bg:#332814;
  --winner-line:rgba(215,169,74,.45);
  --winner-ink:#f1d37d;
  --sheet-bg:#1c1a16;
  --sheet-head-bg:#2b2822;
  --round-info-bg:#26231e;
  --sheet-head-ink:#e7dece;
  --empty-bg:rgba(255,255,255,.06);
  --toast-bg:#f2eee6;
  --toast-ink:#15130f;
}
body{
  margin:0;
  min-height:100vh;
  background:var(--paper);
  color:var(--ink);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
button,input,select{font:inherit}
button{cursor:pointer}
.wrap{max-width:1320px;margin:0 auto;padding:18px}
.top{
  display:grid;
  grid-template-columns:1fr auto;
  gap:14px;
  align-items:end;
  margin-bottom:14px;
}
.brand h1{margin:0;font-size:clamp(1.55rem,3vw,2.35rem);letter-spacing:.02em}
.brand p{margin:4px 0 0;color:var(--muted);font-size:.9rem}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
.layout{display:grid;grid-template-columns:minmax(360px,.95fr) minmax(460px,1.15fr);gap:14px;align-items:start}
.stack{display:flex;flex-direction:column;gap:14px}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
}
.section{padding:14px}
.section-title{
  margin:0 0 12px;
  font-size:1rem;
  font-weight:800;
  letter-spacing:.02em;
}
.settings{
  display:grid;
  grid-template-columns:minmax(180px,1fr) auto minmax(140px,.45fr);
  gap:10px;
  align-items:end;
}
.field{display:flex;flex-direction:column;gap:5px;min-width:0}
label,.label{
  color:var(--muted);
  font-size:.72rem;
  font-weight:800;
  letter-spacing:.07em;
  text-transform:uppercase;
}
input,select{
  width:100%;
  min-height:38px;
  border:1px solid var(--line);
  border-radius:6px;
  background:var(--input);
  color:var(--ink);
  padding:8px 10px;
  outline:none;
}
input:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--focus)}
input[type=number]{text-align:right}
.seg{
  display:flex;
  border:1px solid var(--line);
  border-radius:7px;
  overflow:hidden;
  background:var(--input);
}
.seg button{
  min-width:44px;
  min-height:38px;
  padding:7px 12px;
  border:0;
  border-right:1px solid var(--line);
  background:var(--input);
  color:var(--ink);
  font-weight:800;
}
.seg button:last-child{border-right:0}
.seg button.active{background:var(--green);color:var(--on-accent)}
.btn{
  min-height:38px;
  border:1px solid var(--line);
  border-radius:6px;
  background:var(--button-bg);
  color:var(--ink);
  padding:8px 12px;
  font-weight:800;
}
.btn:hover{border-color:var(--button-hover)}
.btn.primary{background:var(--green);border-color:var(--green);color:var(--on-accent)}
.btn.primary:hover{background:var(--green-dark)}
.btn.warn{color:var(--red)}
.btn.ghost{background:transparent}
.theme-toggle.active{background:var(--green);border-color:var(--green);color:var(--on-accent)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.round-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  margin-bottom:12px;
}
.round-head h2{margin:0;font-size:1.25rem}
.save-state{font-size:.8rem;color:var(--muted);white-space:nowrap}
.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.score-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.player-count-2 .score-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
.score-matrix{
  display:grid;
  grid-template-columns:76px repeat(3,minmax(0,1fr));
  gap:8px;
  align-items:end;
}
.player-count-2 .score-matrix{grid-template-columns:76px repeat(2,minmax(0,1fr))}
.score-matrix .matrix-label{
  align-self:center;
  color:var(--muted);
  font-size:.76rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.score-matrix .matrix-head{
  color:var(--muted);
  font-size:.8rem;
  font-weight:900;
  overflow:hidden;
  text-align:center;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.score-matrix input{font-size:1.2rem;font-weight:900;text-align:center}
.divider{height:1px;background:var(--line);margin:14px 0}
.checks{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.check{
  display:inline-flex;
  gap:8px;
  align-items:center;
  min-height:38px;
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:7px;
  background:var(--input);
  font-weight:700;
}
.check input{width:18px;min-height:18px;accent-color:var(--green)}
.needed{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  padding:10px 12px;
  border:1px solid var(--needed-line);
  border-radius:7px;
  background:var(--needed-bg);
  margin-top:10px;
}
.needed b{font-size:1.35rem;color:var(--needed-ink)}
.message{
  display:none;
  margin-top:10px;
  padding:9px 10px;
  border-radius:6px;
  border:1px solid var(--message-line);
  background:var(--message-bg);
  color:var(--red);
  font-size:.88rem;
}
.message.show{display:block}
.preview{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
}
.player-count-2 .preview{grid-template-columns:repeat(2,minmax(0,1fr))}
.preview-card{
  border:1px solid var(--line);
  border-radius:7px;
  background:var(--preview-bg);
  padding:10px;
  text-align:center;
}
.preview-card .name{font-size:.82rem;color:var(--muted);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-card .total{font-size:1.55rem;font-weight:900;margin-top:3px}
.positive{color:var(--green)}
.negative{color:var(--red)}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.actions .btn.primary{flex:1 1 180px}
.winner{
  display:none;
  border:1px solid var(--winner-line);
  background:var(--winner-bg);
  border-radius:8px;
  padding:12px;
  font-weight:900;
  color:var(--winner-ink);
}
.winner.show{display:block}
.score-sheet{overflow:hidden;border:1px solid var(--line);border-radius:8px;background:var(--sheet-bg)}
.score-sheet-head{
  display:grid;
  grid-template-columns:132px minmax(0,1fr) 76px;
  background:var(--sheet-head-bg);
  border-bottom:1px solid var(--line);
}
.score-sheet-players{
  display:grid;
  grid-template-columns:70px repeat(var(--players),minmax(0,1fr));
}
.score-round{
  display:grid;
  grid-template-columns:132px minmax(0,1fr) 76px;
  border-bottom:1px solid var(--line);
  background:var(--sheet-bg);
}
.score-round:last-child{border-bottom:0}
.round-info{
  padding:6px 8px;
  border-right:1px solid var(--line);
  background:var(--round-info-bg);
}
.round-no{font-size:1rem;font-weight:900;line-height:1}
.round-meta{margin-top:4px;color:var(--muted);font-size:.72rem;line-height:1.22}
.round-meta strong{display:block;color:var(--ink);font-size:.8rem}
.score-lines{
  display:grid;
  grid-template-columns:70px repeat(var(--players),minmax(0,1fr));
}
.sheet-head,.sheet-label,.sheet-cell{
  min-height:26px;
  padding:4px 7px;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.score-lines > :nth-last-child(-n + 4),
.score-sheet-players > *{border-bottom:0}
.player-count-2 .score-lines > :nth-last-child(-n + 3){border-bottom:0}
.sheet-head{
  color:var(--sheet-head-ink);
  background:var(--round-info-bg);
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.06em;
  overflow:hidden;
  text-align:center;
  text-overflow:ellipsis;
  text-transform:uppercase;
  white-space:nowrap;
}
.sheet-label{
  color:var(--muted);
  background:var(--round-info-bg);
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.sheet-cell{text-align:center;font-weight:800}
.sheet-cell.total{font-size:1rem;font-weight:900}
.sheet-actions{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4px 6px;
}
.sheet-actions .btn{min-height:28px;padding:4px 9px}
.empty{
  padding:34px 16px;
  text-align:center;
  color:var(--muted);
  border:1px dashed var(--line);
  border-radius:8px;
  background:var(--empty-bg);
}
.history-title-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.history-title-row .section-title{margin:0}
.history-count{display:block;margin-top:2px;color:var(--muted);font-size:.72rem}
.history-clear{min-height:30px;padding:5px 8px;font-size:.72rem}
.game-history-list{display:flex;flex-direction:column;gap:7px;max-height:440px;overflow:auto;padding:2px}
.archived-game{border:1px solid var(--line);border-radius:7px;background:var(--sheet-bg);overflow:hidden}
.archived-game summary{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  align-items:center;
  gap:10px;
  min-height:44px;
  padding:7px 9px;
  cursor:pointer;
  list-style:none;
}
.archived-game summary::-webkit-details-marker{display:none}
.archived-game[open] summary{border-bottom:1px solid var(--line);background:var(--sheet-head-bg)}
.archive-heading{min-width:0}
.archive-title{display:block;overflow:hidden;font-size:.84rem;font-weight:900;text-overflow:ellipsis;white-space:nowrap}
.archive-meta{display:block;margin-top:2px;color:var(--muted);font-size:.68rem}
.archive-result{max-width:240px;overflow:hidden;color:var(--green);font-size:.76rem;font-weight:900;text-align:right;text-overflow:ellipsis;white-space:nowrap}
.archive-body{padding:8px 9px}
.archive-totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:6px}
.archive-total{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;background:var(--round-info-bg);font-size:.72rem}
.archive-total span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.archive-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:8px}
.archive-actions .btn{min-height:30px;padding:5px 8px;font-size:.72rem}
.file-input{display:none}
.toast{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  background:var(--toast-bg);
  color:var(--toast-ink);
  padding:10px 14px;
  border-radius:6px;
  box-shadow:var(--shadow);
  opacity:0;
  pointer-events:none;
  transition:opacity .16s;
  z-index:20;
}
.toast.show{opacity:1}
@media(max-width:900px){
  .top,.layout,.settings{grid-template-columns:1fr}
  .toolbar{justify-content:flex-start}
}
@media(max-width:620px){
  .wrap{padding:12px}
  .form-grid,.score-grid,.player-count-2 .score-grid,.preview,.player-count-2 .preview{grid-template-columns:1fr}
  .score-matrix{grid-template-columns:64px repeat(3,minmax(54px,1fr))}
  .player-count-2 .score-matrix{grid-template-columns:64px repeat(2,minmax(70px,1fr))}
  .score-sheet-head,.score-round{grid-template-columns:1fr}
  .score-sheet-head > div:first-child,.score-sheet-head > div:last-child{display:none}
  .round-info{border-right:0;border-bottom:1px solid var(--line)}
  .sheet-actions{justify-content:flex-end;border-top:1px solid var(--line)}
  .round-head{align-items:flex-start;flex-direction:column}
  .archived-game summary{grid-template-columns:1fr;gap:3px}
  .archive-result{max-width:none;text-align:left}
}
@media print{
  html.dark-mode{
    color-scheme:light;
    --ink:#1f2420;
    --muted:#69736c;
    --paper:#fff;
    --panel:#fffdf8;
    --line:#d3cab9;
    --green:#2f684d;
    --green-dark:#214c38;
    --gold:#b8892f;
    --red:#a33b32;
    --blue:#2f5f8c;
    --input:#fff;
    --button-bg:#fff;
    --on-accent:#fff;
    --needed-bg:#fff8e8;
    --needed-line:rgba(184,137,47,.35);
    --needed-ink:#7d5a16;
    --message-bg:#fff1ef;
    --message-line:rgba(163,59,50,.25);
    --preview-bg:#fff;
    --winner-bg:#fff6df;
    --winner-line:rgba(184,137,47,.4);
    --winner-ink:#725111;
    --sheet-bg:#fff;
    --sheet-head-bg:#f8f5ee;
    --round-info-bg:#fbf8f1;
    --sheet-head-ink:#4a453d;
    --empty-bg:rgba(255,255,255,.45);
  }
  body{background:#fff}
  .wrap{max-width:none;padding:0}
  .toolbar,.actions,.settings-panel,.message,.sheet-actions,.history-panel,.toast{display:none}
  .panel{box-shadow:none}
  .layout{grid-template-columns:1fr}
}
</style>
<link rel="stylesheet" href="tracker-shell.css">
<script>
try{
  if(window.localStorage && window.localStorage.getItem('pinochleScorekeeper.darkMode.v1') === 'true'){
    document.documentElement.classList.add('dark-mode');
  }
}catch(error){}
</script>
</head>
<body>
<div class="wrap" id="app">
  <header class="top">
    <div class="brand">
      <a class="tracker-home" href="scorecards.html">← Tracker Library</a>
      <h1>Pinochle Scorecard</h1>
      <p>Bid, meld, trick, and cumulative scoring for 2–3 players or teams. <span class="header-save-state" id="saveState" role="status" aria-live="polite">Loading...</span></p>
    </div>
    <div class="toolbar">
      <button class="btn theme-toggle" id="themeBtn" type="button" aria-pressed="false" title="Switch to dark mode">Dark Mode</button>
      <button class="btn" id="printBtn" type="button">Print</button>
      <button class="btn" id="exportBtn" type="button">Backup</button>
      <button class="btn" id="importBtn" type="button">Import</button>
      <button class="btn primary" id="finishBtn" type="button">Finish Game</button>
      <button class="btn warn" id="resetBtn" type="button">New Game</button>
      <input class="file-input" id="importFile" type="file" accept="application/json,.json">
    </div>
  </header>

  <main class="layout">
    <section class="stack">
      <div class="panel section settings-panel">
        <div class="settings">
          <div class="field">
            <label for="gameTitle">Game Name</label>
            <input id="gameTitle" type="text" maxlength="48">
          </div>
          <div class="field">
            <span class="label">Players/Teams</span>
            <div class="seg" id="playerCount" aria-label="Players or teams">
              <button type="button" data-count="2">2</button>
              <button type="button" data-count="3">3</button>
            </div>
          </div>
          <div class="field">
            <label for="targetScore">Playing To</label>
            <input id="targetScore" type="number" min="1" step="1">
          </div>
        </div>
        <div class="divider"></div>
        <div class="score-grid" id="nameGrid"></div>
      </div>

      <form class="panel section" id="roundForm">
        <div class="round-head">
          <h2 id="roundTitle">Round</h2>
          <span class="save-state" id="editState"></span>
        </div>

        <div class="form-grid">
          <div class="field">
            <label for="dealer">Dealer</label>
            <select id="dealer"></select>
          </div>
          <div class="field">
            <label for="bidder">Bidder</label>
            <select id="bidder"></select>
          </div>
          <div class="field">
            <label for="bid">Bid</label>
            <input id="bid" type="number" min="0" step="1" placeholder="25">
          </div>
        </div>

        <div class="form-grid" style="margin-top:10px">
          <div class="field">
            <label for="trump">Trump</label>
            <select id="trump">
              <option value="">Select trump</option>
              <option>Spades</option>
              <option>Hearts</option>
              <option>Clubs</option>
              <option>Diamonds</option>
            </select>
          </div>
          <div class="field">
            <span class="label">Round State</span>
            <label class="check">
              <input id="thrown" type="checkbox">
              Bidder conceded
            </label>
          </div>
        </div>

        <div class="needed" id="neededBox">
          <span id="neededLabel">Needed</span>
          <b id="neededValue">0</b>
        </div>

        <div class="divider"></div>
        <h3 class="section-title">Scores</h3>
        <div class="score-matrix" id="scoreMatrix"></div>

        <div class="divider"></div>
        <h3 class="section-title">Round Preview</h3>
        <div class="preview" id="previewGrid"></div>
        <div class="message" id="formMessage"></div>

        <div class="actions">
          <button class="btn primary" id="submitRound" type="submit">Add Round</button>
          <button class="btn ghost" id="cancelEdit" type="button">Cancel Edit</button>
          <button class="btn ghost" id="clearRound" type="button">Clear Round</button>
        </div>
      </form>
    </section>

    <section class="stack">
      <div class="winner" id="winnerBox"></div>
      <div class="panel section">
        <h2 class="section-title">Running Tally</h2>
        <div id="history"></div>
      </div>
      <div class="panel section history-panel">
        <h2 class="section-title">All-Time Stats</h2>
        <div id="gameStats"></div>
        <details class="match-records">
          <summary><span>Manage saved matches</span><span class="history-count" id="gameHistoryCount">0 saved matches</span></summary>
          <div class="match-records-body">
            <div class="match-records-toolbar">
              <span>Restore or delete individual match records.</span>
              <button class="btn warn history-clear" id="clearHistoryBtn" type="button">Clear Saved Data</button>
            </div>
            <div id="gameHistory"></div>
          </div>
        </details>
      </div>
    </section>
  </main>
</div>
<div class="toast" id="toast"></div>

<script src="score-stats.js"></script>
<script>
const STORE_KEY = 'pinochleScorekeeper.v2';
const THEME_KEY = 'pinochleScorekeeper.darkMode.v1';
const LEGACY_KEY = 'pinochleGame';
const HISTORY_KEY = 'pinochleScorekeeper.history.v1';
const BACKUP_VERSION = 1;
const MAX_ARCHIVED_GAMES = 250;
const MAX_PLAYERS = 3;
const TRICK_TOTAL = 25;
const COLORS = ['#2f684d','#2f5f8c','#b8892f'];

let state = loadState();
let gameArchive = loadGameArchive();
let darkMode = loadDarkMode();
let saveTimer = 0;
let autoTrickIndex = null;

function emptyRound(dealer){
  return {
    dealer: clampPlayer(dealer ?? 0),
    bidder: null,
    bid: null,
    trump: '',
    thrown: false,
    meld: Array(MAX_PLAYERS).fill(null),
    tricks: Array(MAX_PLAYERS).fill(null)
  };
}

function defaultState(){
  return {
    version: 2,
    title: 'Game Night',
    playerCount: 3,
    targetScore: 150,
    players: ['Player 1','Player 2','Player 3'],
    rounds: [],
    editingIndex: null,
    draft: emptyRound(0)
  };
}

function loadState(){
  const saved = readJson(STORE_KEY);
  if(saved) return normalizeState(saved);

  const legacy = readJson(LEGACY_KEY);
  if(legacy) return normalizeState(migrateLegacy(legacy));

  return defaultState();
}

function readJson(key){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  }catch(error){
    return null;
  }
}

function loadGameArchive(){
  try{
    const raw = localStorage.getItem(HISTORY_KEY);
    return normalizeGameArchive(raw ? JSON.parse(raw) : []);
  }catch(error){
    return [];
  }
}

function saveGameArchive(){
  try{
    localStorage.setItem(HISTORY_KEY, JSON.stringify(gameArchive));
    return true;
  }catch(error){
    return false;
  }
}

function loadDarkMode(){
  try{
    return localStorage.getItem(THEME_KEY) === 'true';
  }catch(error){
    return false;
  }
}

function saveDarkMode(){
  try{
    localStorage.setItem(THEME_KEY, darkMode ? 'true' : 'false');
  }catch(error){}
}

function applyTheme(){
  document.documentElement.classList.toggle('dark-mode', darkMode);
  const themeButton = document.getElementById('themeBtn');
  if(!themeButton) return;
  themeButton.classList.toggle('active', darkMode);
  themeButton.setAttribute('aria-pressed', String(darkMode));
  themeButton.textContent = darkMode ? 'Light Mode' : 'Dark Mode';
  themeButton.title = darkMode ? 'Switch to light mode' : 'Switch to dark mode';
}

function saveNow(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    setSaveState('Saved ' + new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}));
  }catch(error){
    setSaveState('Saved for this tab');
  }
}

function scheduleSave(){
  setSaveState('Saving...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNow, 120);
}

function setSaveState(text){
  document.getElementById('saveState').textContent = text;
}

function migrateLegacy(legacy){
  const players = Array.from({length:MAX_PLAYERS},(_,i)=>{
    const player = legacy.players?.[i];
    return String(player?.name || player || 'Player ' + (i+1));
  });
  const rounds = Array.isArray(legacy.history) ? legacy.history.map(round => normalizeRound({
    dealer: round.dealer,
    bidder: round.bidder,
    bid: round.bid,
    trump: round.trump,
    thrown: !!round.handThrown,
    meld: round.meld,
    tricks: round.tricks
  })) : [];

  return {
    ...defaultState(),
    title: 'Game Night',
    playerCount: 3,
    targetScore: numberOr(legacy.winningScore, 150),
    players,
    rounds,
    draft: emptyRound(numberOr(legacy.dealer, nextDealerFrom(rounds, 3)))
  };
}

function normalizeState(next){
  const base = defaultState();
  next = {...base, ...next};
  next.version = 2;
  next.playerCount = Math.min(MAX_PLAYERS, Math.max(2, numberOr(next.playerCount, 3)));
  next.targetScore = Math.max(1, numberOr(next.targetScore ?? next.winningScore, 150));
  next.players = Array.from({length:MAX_PLAYERS},(_,i)=>String(next.players?.[i] || base.players[i]));
  next.rounds = Array.isArray(next.rounds) ? next.rounds.map(normalizeRound) : [];
  next.editingIndex = Number.isInteger(next.editingIndex) ? next.editingIndex : null;
  if(next.editingIndex !== null && (next.editingIndex < 0 || next.editingIndex >= next.rounds.length)){
    next.editingIndex = null;
  }
  next.draft = normalizeRound(next.draft || emptyRound(nextDealerFrom(next.rounds, next.playerCount)));
  normalizeForPlayerCount(next);
  return next;
}

function normalizeGameArchive(source){
  if(!Array.isArray(source)) return [];
  return source
    .map((entry,index)=>normalizeArchivedGame(entry,index))
    .filter(Boolean)
    .slice(0,MAX_ARCHIVED_GAMES);
}

function normalizeArchivedGame(source,index){
  if(!source || typeof source !== 'object') return null;
  const gameSource = source.state || source.game || source.scorecard;
  if(!gameSource || typeof gameSource !== 'object') return null;
  const archivedState = normalizeState(gameSource);
  if(!archivedState.rounds.length) return null;
  archivedState.editingIndex = null;
  archivedState.draft = emptyRound(nextDealerFrom(archivedState.rounds, archivedState.playerCount));
  const date = new Date(source.completedAt || source.date || Date.now());
  const completedAt = Number.isNaN(date.getTime()) ? new Date().toISOString() : date.toISOString();
  const id = String(source.id || ('game-' + completedAt + '-' + index)).slice(0,120);
  return {id, completedAt, state:archivedState};
}

function normalizeForPlayerCount(model){
  model.rounds.forEach(round => {
    round.dealer = clampPlayer(round.dealer, model.playerCount);
    round.bidder = round.bidder === null ? null : clampPlayer(round.bidder, model.playerCount);
  });
  model.draft.dealer = clampPlayer(model.draft.dealer, model.playerCount);
  if(model.draft.bidder !== null) model.draft.bidder = clampPlayer(model.draft.bidder, model.playerCount);
}

function normalizeRound(round){
  const next = emptyRound(round?.dealer ?? 0);
  next.bidder = round?.bidder === null || round?.bidder === undefined ? null : clampPlayer(round.bidder);
  next.bid = nullableNumber(round?.bid);
  next.trump = String(round?.trump || '');
  next.thrown = !!round?.thrown || !!round?.handThrown;
  next.meld = Array.from({length:MAX_PLAYERS},(_,i)=>nullableNumber(round?.meld?.[i]));
  next.tricks = Array.from({length:MAX_PLAYERS},(_,i)=>nullableNumber(round?.tricks?.[i]));
  if(next.thrown) next.tricks = Array(MAX_PLAYERS).fill(null);
  return next;
}

function visiblePlayers(){
  return Array.from({length:state.playerCount},(_,i)=>i);
}

function playerIndexes(count){
  return Array.from({length:count},(_,i)=>i);
}

function clampPlayer(value, count){
  const limit = count || MAX_PLAYERS;
  return Math.min(limit - 1, Math.max(0, numberOr(value, 0)));
}

function nullableNumber(value){
  if(value === '' || value === null || value === undefined) return null;
  const number = Number(value);
  return Number.isFinite(number) ? Math.max(0, number) : null;
}

function numberOr(value, fallback){
  const number = Number(value);
  return Number.isFinite(number) ? number : fallback;
}

function format(value){
  const number = numberOr(value, 0);
  return number.toLocaleString();
}

function signed(value){
  return value > 0 ? '+' + format(value) : format(value);
}

function nextDealerFrom(rounds, playerCount){
  if(!rounds.length) return 0;
  return (clampPlayer(rounds[rounds.length - 1].dealer, playerCount) + 1) % playerCount;
}

function currentTotals(round){
  return totalsForRound(round, state.playerCount);
}

function totalsForRound(round, playerCount){
  const totals = Array(MAX_PLAYERS).fill(0);
  const bid = numberOr(round.bid, 0);
  const bidder = round.bidder;
  const visible = playerIndexes(playerCount);

  if(round.thrown){
    visible.forEach(i => {
      totals[i] = i === bidder ? -bid : numberOr(round.meld[i], 0);
    });
    return totals;
  }

  const shutout = visible.find(i => numberOr(round.tricks[i], 0) === TRICK_TOTAL);
  const bidMade = isBidMade(round);

  visible.forEach(i => {
    const meld = numberOr(round.meld[i], 0);
    const tricks = numberOr(round.tricks[i], 0);
    if(!bidMade && i === bidder){
      totals[i] = -bid;
    }else if(shutout !== undefined){
      totals[i] = i === shutout ? meld + tricks : tricks;
    }else if(tricks === 0){
      totals[i] = 0;
    }else{
      totals[i] = meld + tricks;
    }
  });
  return totals;
}

function isBidMade(round){
  if(round.thrown || round.bidder === null) return false;
  const tricks = numberOr(round.tricks[round.bidder], 0);
  if(tricks <= 0) return false;
  return numberOr(round.meld[round.bidder], 0) + tricks >= numberOr(round.bid, 0);
}

function cumulativeTotals(throughIndex){
  return cumulativeTotalsForGame(state, throughIndex);
}

function cumulativeTotalsForGame(game, throughIndex){
  const totals = Array(MAX_PLAYERS).fill(0);
  const end = throughIndex === undefined ? game.rounds.length - 1 : throughIndex;
  for(let r=0; r<=end; r++){
    const roundTotals = totalsForRound(game.rounds[r], game.playerCount);
    playerIndexes(game.playerCount).forEach(i => totals[i] += roundTotals[i]);
  }
  return totals;
}

function totalsForGame(game){
  return cumulativeTotalsForGame(game);
}

function largestMeldForPlayer(game,index){
  return game.rounds.reduce((largest,round)=>{
    const meld = round.meld[index];
    if(meld === null || meld === undefined || meld === '') return largest;
    const score = Number(meld);
    if(!Number.isFinite(score)) return largest;
    return largest === null || score > largest ? score : largest;
  },null);
}

function gamePlayerName(game,index){
  return game.players[index] || 'Player ' + (index + 1);
}

function leadersForGame(game,totals){
  if(!game.rounds.length) return [];
  const visibleTotals = playerIndexes(game.playerCount).map(i=>totals[i]);
  const best = Math.max(...visibleTotals);
  return playerIndexes(game.playerCount).filter(i=>totals[i] === best);
}

function winnerIndex(){
  const totals = cumulativeTotals();
  return visiblePlayers().find(i => totals[i] >= state.targetScore);
}

function validateRound(round){
  if(round.bidder === null) return 'Select a bidder.';
  if(!numberOr(round.bid, 0)) return 'Enter the bid.';
  if(round.thrown) return '';

  const visible = visiblePlayers();
  const missing = visible.some(i => round.tricks[i] === null);
  if(missing) return 'Enter trick points for each player/team.';

  const sum = visible.reduce((total,i)=>total + numberOr(round.tricks[i], 0), 0);
  if(sum !== TRICK_TOTAL) return 'Trick points must total ' + TRICK_TOTAL + '. Current total is ' + sum + '.';

  return '';
}

function render(){
  applyTheme();
  document.getElementById('app').classList.toggle('player-count-2', state.playerCount === 2);
  document.getElementById('gameTitle').value = state.title;
  document.getElementById('targetScore').value = state.targetScore;
  renderPlayerCount();
  renderNameGrid();
  renderRoundForm();
  renderHistory();
  renderGameArchive();
  renderWinner();
  document.getElementById('finishBtn').disabled = state.rounds.length === 0;
}

function renderPlayerCount(){
  document.querySelectorAll('#playerCount button').forEach(button=>{
    button.classList.toggle('active', Number(button.dataset.count) === state.playerCount);
  });
}

function renderNameGrid(){
  const grid = document.getElementById('nameGrid');
  grid.innerHTML = '';
  visiblePlayers().forEach(i=>{
    const field = document.createElement('div');
    field.className = 'field';
    field.innerHTML = '<label for="playerName' + i + '">Name ' + (i+1) + '</label>';
    const input = document.createElement('input');
    input.id = 'playerName' + i;
    input.type = 'text';
    input.maxLength = 24;
    input.value = state.players[i];
    input.style.borderLeft = '5px solid ' + COLORS[i];
    input.addEventListener('input',()=>{
      state.players[i] = input.value;
      syncPlayerSelects();
      renderScoreMatrix();
      renderHistory();
      renderPreview();
      scheduleSave();
    });
    field.appendChild(input);
    grid.appendChild(field);
  });
}

function renderRoundForm(){
  document.getElementById('roundTitle').textContent = state.editingIndex === null ? 'Round ' + (state.rounds.length + 1) : 'Round ' + (state.editingIndex + 1);
  document.getElementById('editState').textContent = state.editingIndex === null ? '' : 'Editing';
  document.getElementById('submitRound').textContent = state.editingIndex === null ? 'Add Round' : 'Save Round';
  document.getElementById('cancelEdit').style.display = state.editingIndex === null ? 'none' : '';

  syncPlayerSelects();
  document.getElementById('bid').value = state.draft.bid ?? '';
  document.getElementById('trump').value = state.draft.trump || '';
  document.getElementById('thrown').checked = !!state.draft.thrown;
  renderScoreMatrix();
  renderNeeded();
  renderPreview();
  setMessage('');
}

function syncPlayerSelects(){
  const dealer = document.getElementById('dealer');
  const bidder = document.getElementById('bidder');
  const dealerValue = String(clampPlayer(state.draft.dealer, state.playerCount));
  const bidderValue = state.draft.bidder === null ? '' : String(clampPlayer(state.draft.bidder, state.playerCount));

  dealer.innerHTML = '';
  bidder.innerHTML = '<option value="">Select bidder</option>';
  visiblePlayers().forEach(i=>{
    const dealerOption = new Option(state.players[i] || 'Player ' + (i+1), String(i));
    const bidderOption = new Option(state.players[i] || 'Player ' + (i+1), String(i));
    dealer.add(dealerOption);
    bidder.add(bidderOption);
  });
  dealer.value = dealerValue;
  bidder.value = bidderValue;
}

function renderScoreMatrix(){
  const grid = document.getElementById('scoreMatrix');
  grid.innerHTML = '<div></div>';

  visiblePlayers().forEach(i=>{
    const head = document.createElement('div');
    head.className = 'matrix-head';
    head.textContent = state.players[i] || 'Player ' + (i+1);
    grid.appendChild(head);
  });

  appendScoreRow(grid, 'Meld', 'meld');
  appendScoreRow(grid, 'Tricks', 'tricks');
}

function appendScoreRow(grid, label, key){
  const rowLabel = document.createElement('div');
  rowLabel.className = 'matrix-label';
  rowLabel.textContent = label;
  grid.appendChild(rowLabel);

  visiblePlayers().forEach(i=>{
    const input = document.createElement('input');
    input.type = 'number';
    input.step = '1';
    input.min = '0';
    input.value = state.draft[key][i] ?? '';
    input.placeholder = '0';
    input.disabled = key === 'tricks' && state.draft.thrown;
    input.setAttribute('aria-label', label + ' for ' + (state.players[i] || 'Player ' + (i+1)));
    input.addEventListener('input',()=>{
      if(key === 'tricks') setDraftTrick(i, input.value);
      else state.draft.meld[i] = nullableNumber(input.value);
      renderNeeded();
      renderPreview();
      scheduleSave();
    });
    grid.appendChild(input);
  });
}

function setDraftTrick(index, value){
  const tricks = state.draft.tricks;
  tricks[index] = nullableNumber(value);

  if(autoTrickIndex === index) autoTrickIndex = null;
  if(tricks[index] === null && autoTrickIndex !== null){
    tricks[autoTrickIndex] = null;
    autoTrickIndex = null;
  }

  let target = autoTrickIndex;
  const visible = visiblePlayers();
  const empty = visible.filter(i => tricks[i] === null);
  if(target === null || target === index){
    target = empty.length === 1 ? empty[0] : null;
  }

  if(target !== null && target !== index){
    const others = visible.filter(i => i !== target);
    if(others.every(i => tricks[i] !== null)){
      const sum = others.reduce((total,i)=>total + numberOr(tricks[i], 0), 0);
      tricks[target] = Math.max(0, TRICK_TOTAL - sum);
      autoTrickIndex = target;
    }
  }

  renderScoreMatrix();
}

function renderNeeded(){
  const box = document.getElementById('neededBox');
  const bidder = state.draft.bidder;
  if(bidder === null || !numberOr(state.draft.bid, 0)){
    box.style.display = 'none';
    return;
  }
  box.style.display = '';
  const needed = Math.max(0, numberOr(state.draft.bid, 0) - numberOr(state.draft.meld[bidder], 0));
  document.getElementById('neededLabel').textContent = (state.players[bidder] || 'Bidder') + ' needs';
  document.getElementById('neededValue').textContent = format(needed);
}

function renderPreview(){
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';
  const totals = currentTotals(state.draft);
  visiblePlayers().forEach(i=>{
    const card = document.createElement('div');
    const value = totals[i];
    card.className = 'preview-card';
    card.innerHTML = '<div class="name">' + escapeHtml(state.players[i] || 'Player ' + (i+1)) + '</div>' +
      '<div class="total ' + (value < 0 ? 'negative' : 'positive') + '">' + signed(value) + '</div>';
    grid.appendChild(card);
  });
}

function renderWinner(){
  const winner = winnerIndex();
  const box = document.getElementById('winnerBox');
  if(winner === undefined){
    box.classList.remove('show');
    box.textContent = '';
  }else{
    box.classList.add('show');
    box.textContent = (state.players[winner] || 'Player ' + (winner + 1)) + ' has reached ' + state.targetScore + '.';
  }
}

function renderHistory(){
  const target = document.getElementById('history');
  if(!state.rounds.length){
    target.innerHTML = '<div class="empty">No rounds yet.</div>';
    return;
  }

  const players = visiblePlayers();
  let html = '<div class="score-sheet">';
  html += '<div class="score-sheet-head"><div></div><div class="score-sheet-players" style="--players:' + players.length + '"><div></div>';
  players.forEach(i=>{
    html += '<div class="sheet-head">' + escapeHtml(state.players[i] || 'Player ' + (i+1)) + '</div>';
  });
  html += '</div><div></div></div>';

  state.rounds.forEach((round, roundIndex)=>{
    const roundTotals = currentTotals(round);
    const runningTotals = cumulativeTotals(roundIndex);
    const bidderName = round.bidder === null ? '-' : state.players[round.bidder];
    const bidMade = isBidMade(round);
    const bidderSet = !round.thrown && !bidMade;
    const status = round.thrown ? 'Conceded' : (bidMade ? 'Made' : 'Set');
    html += '<div class="score-round">';
    html += '<div class="round-info"><div class="round-no">Round ' + (roundIndex + 1) + '</div>';
    html += '<div class="round-meta"><strong>' + escapeHtml(bidderName || '-') + ' bid ' + format(round.bid || 0) + '</strong>';
    html += 'Dealer: ' + escapeHtml(state.players[round.dealer] || '-') + '<br>';
    html += 'Trump: ' + escapeHtml(round.trump || '-') + '<br>';
    html += 'Result: ' + status + '</div></div>';

    html += '<div class="score-lines" style="--players:' + players.length + '">';
    html += '<div class="sheet-label">Meld</div>';
    players.forEach(i=>{
      const shownMeld = (round.thrown || bidderSet) && i === round.bidder ? -numberOr(round.bid, 0) : numberOr(round.meld[i], 0);
      html += '<div class="sheet-cell ' + (shownMeld < 0 ? 'negative' : '') + '">' + (shownMeld < 0 ? signed(shownMeld) : format(shownMeld)) + '</div>';
    });
    html += '<div class="sheet-label">Tricks</div>';
    players.forEach(i=>{
      const shownTricks = (round.thrown || (bidderSet && i === round.bidder)) ? '-' : format(round.tricks[i] || 0);
      html += '<div class="sheet-cell">' + shownTricks + '</div>';
    });
    html += '<div class="sheet-label">Total</div>';
    players.forEach(i=>{
      html += '<div class="sheet-cell total ' + (runningTotals[i] < 0 ? 'negative' : 'positive') + '">' + signed(runningTotals[i]) + '</div>';
    });
    html += '</div>';
    html += '<div class="sheet-actions"><button class="btn" type="button" data-edit="' + roundIndex + '">Edit</button></div>';
    html += '</div>';
  });

  html += '</div>';
  target.innerHTML = html;
}

function renderGameArchive(){
  const target = document.getElementById('gameHistory');
  const count = gameArchive.length;
  const statRecords = gameArchive.map(entry=>{
    const game = entry.state;
    const totals = totalsForGame(game);
    return {
      completedAt:entry.completedAt,
      direction:'high',
      participants:Array.from({length:game.playerCount},(_,index)=>({
        name:gamePlayerName(game,index),
        score:totals[index],
        meld:largestMeldForPlayer(game,index)
      })),
      winnerIndexes:leadersForGame(game,totals)
    };
  });
  ScoreStats.render(document.getElementById('gameStats'),statRecords,{showLargestMeld:true});
  document.getElementById('gameHistoryCount').textContent = count + (count === 1 ? ' saved match' : ' saved matches');
  document.getElementById('clearHistoryBtn').disabled = count === 0;
  if(!count){
    target.innerHTML = '<div class="empty">Finished games will appear here.</div>';
    return;
  }

  let html = '<div class="game-history-list">';
  gameArchive.forEach(entry=>{
    const game = entry.state;
    const totals = totalsForGame(game);
    const leaderIndexes = leadersForGame(game,totals);
    const leaderNames = leaderIndexes.map(i=>gamePlayerName(game,i)).join(', ');
    const reachedTarget = playerIndexes(game.playerCount).some(i=>totals[i] >= game.targetScore);
    const resultLabel = reachedTarget ? (leaderIndexes.length === 1 ? 'Winner' : 'Winners') : (leaderIndexes.length === 1 ? 'Final leader' : 'Final leaders');
    const resultScore = leaderIndexes.length ? format(totals[leaderIndexes[0]]) : '0';
    const roundsLabel = game.rounds.length + (game.rounds.length === 1 ? ' round' : ' rounds');
    const playersLabel = game.playerCount + ' players/teams';
    const entryId = escapeHtml(entry.id);
    html += '<details class="archived-game">';
    html += '<summary><span class="archive-heading"><span class="archive-title">' + escapeHtml(game.title) + '</span>';
    html += '<span class="archive-meta">' + escapeHtml(formatArchivedDate(entry.completedAt)) + ' · ' + roundsLabel + ' · ' + playersLabel + '</span></span>';
    html += '<span class="archive-result">' + resultLabel + ': ' + escapeHtml(leaderNames) + ' · ' + resultScore + '</span></summary>';
    html += '<div class="archive-body"><div class="archive-totals">';
    for(let i=0; i<game.playerCount; i++){
      html += '<div class="archive-total"><span>' + escapeHtml(gamePlayerName(game,i)) + '</span><strong>' + format(totals[i]) + '</strong></div>';
    }
    html += '</div><div class="archive-actions">';
    html += '<button class="btn" type="button" data-restore-game="' + entryId + '">Restore Game</button>';
    html += '<button class="btn warn" type="button" data-delete-game="' + entryId + '">Delete</button>';
    html += '</div></div></details>';
  });
  html += '</div>';
  target.innerHTML = html;
}

function formatArchivedDate(value){
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return 'Unknown date';
  return date.toLocaleString([], {
    month:'short',
    day:'numeric',
    year:'numeric',
    hour:'numeric',
    minute:'2-digit'
  });
}

function setMessage(text){
  const message = document.getElementById('formMessage');
  message.textContent = text;
  message.classList.toggle('show', !!text);
}

function saveDraft(){
  const error = validateRound(state.draft);
  if(error){
    setMessage(error);
    return;
  }

  const round = normalizeRound(state.draft);
  if(state.editingIndex === null){
    state.rounds.push(round);
  }else{
    state.rounds[state.editingIndex] = round;
    state.editingIndex = null;
  }

  state.draft = emptyRound(nextDealerFrom(state.rounds, state.playerCount));
  autoTrickIndex = null;
  render();
  scheduleSave();
}

function clearDraft(){
  state.draft = emptyRound(state.editingIndex === null ? nextDealerFrom(state.rounds, state.playerCount) : state.draft.dealer);
  autoTrickIndex = null;
  renderRoundForm();
  scheduleSave();
}

function cancelEdit(){
  state.editingIndex = null;
  state.draft = emptyRound(nextDealerFrom(state.rounds, state.playerCount));
  autoTrickIndex = null;
  render();
  scheduleSave();
}

function createArchivedGame(){
  const archivedState = normalizeState(state);
  archivedState.editingIndex = null;
  archivedState.draft = emptyRound(nextDealerFrom(archivedState.rounds, archivedState.playerCount));
  return {
    id:'game-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8),
    completedAt:new Date().toISOString(),
    state:archivedState
  };
}

function finishGame(){
  if(!state.rounds.length){
    toast('Add at least one round first');
    return;
  }
  if(!confirm('Finish and archive this game, then start a new scorecard?')) return;
  const previousArchive = gameArchive;
  gameArchive = [createArchivedGame(), ...gameArchive].slice(0,MAX_ARCHIVED_GAMES);
  if(!saveGameArchive()){
    gameArchive = previousArchive;
    toast('Game history could not be saved');
    return;
  }
  state = defaultState();
  autoTrickIndex = null;
  render();
  saveNow();
  toast('Game saved to history');
}

function restoreArchivedGame(id){
  const entry = gameArchive.find(game=>game.id === id);
  if(!entry) return;
  if(!confirm('Restore this archived game? The current scorecard will be replaced.')) return;
  state = normalizeState(entry.state);
  state.editingIndex = null;
  state.draft = emptyRound(nextDealerFrom(state.rounds, state.playerCount));
  autoTrickIndex = null;
  render();
  saveNow();
  toast('Archived game restored');
}

function deleteArchivedGame(id){
  const index = gameArchive.findIndex(game=>game.id === id);
  if(index === -1) return;
  if(!confirm('Delete this game from history?')) return;
  const previousArchive = gameArchive;
  gameArchive = gameArchive.filter(game=>game.id !== id);
  if(!saveGameArchive()){
    gameArchive = previousArchive;
    toast('Game history could not be updated');
    return;
  }
  renderGameArchive();
  toast('Archived game deleted');
}

function clearGameArchive(){
  if(!gameArchive.length) return;
  if(!confirm('Delete all archived games? Export a backup first if you may need them later.')) return;
  const previousArchive = gameArchive;
  gameArchive = [];
  if(!saveGameArchive()){
    gameArchive = previousArchive;
    toast('Game history could not be updated');
    return;
  }
  renderGameArchive();
  toast('Game history cleared');
}

function exportData(){
  const backup = {
    kind:'pinochle-scorekeeper-backup',
    version:BACKUP_VERSION,
    exportedAt:new Date().toISOString(),
    current:state,
    history:gameArchive,
    preferences:{darkMode}
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  link.href = url;
  link.download = 'pinochle-scorekeeper-backup-' + stamp + '.json';
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(()=>URL.revokeObjectURL(url),0);
  toast('Full backup exported');
}

function importData(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const imported = JSON.parse(reader.result);
      const isFullBackup = imported && typeof imported === 'object' && imported.current && Array.isArray(imported.history);
      if(isFullBackup){
        if(!confirm('Import this full backup? The current scorecard and game history will be replaced.')) return;
        state = normalizeState(imported.current);
        gameArchive = normalizeGameArchive(imported.history);
        if(imported.preferences && typeof imported.preferences.darkMode === 'boolean'){
          darkMode = imported.preferences.darkMode;
          saveDarkMode();
        }
        if(!saveGameArchive()) toast('Game history could not be saved in this browser');
      }else{
        if(!confirm('Import this scorecard? The current scorecard will be replaced.')) return;
        state = normalizeState(imported);
      }
      autoTrickIndex = null;
      render();
      saveNow();
      toast(isFullBackup ? 'Full backup imported' : 'Scorecard imported');
    }catch(error){
      setMessage('That backup could not be imported.');
      toast('Backup import failed');
    }
  };
  reader.readAsText(file);
}

function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, char => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[char]));
}

function toast(message){
  const node = document.getElementById('toast');
  node.textContent = message;
  node.classList.add('show');
  setTimeout(()=>node.classList.remove('show'),1700);
}

document.getElementById('gameTitle').addEventListener('input',event=>{
  state.title = event.target.value;
  scheduleSave();
});

document.getElementById('targetScore').addEventListener('input',event=>{
  state.targetScore = Math.max(1, numberOr(event.target.value, 150));
  renderWinner();
  scheduleSave();
});

document.getElementById('playerCount').addEventListener('click',event=>{
  const button = event.target.closest('button[data-count]');
  if(!button) return;
  state.playerCount = Number(button.dataset.count);
  normalizeForPlayerCount(state);
  if(state.editingIndex === null) state.draft.dealer = nextDealerFrom(state.rounds, state.playerCount);
  autoTrickIndex = null;
  render();
  scheduleSave();
});

document.getElementById('dealer').addEventListener('change',event=>{
  state.draft.dealer = Number(event.target.value);
  scheduleSave();
});

document.getElementById('bidder').addEventListener('change',event=>{
  state.draft.bidder = event.target.value === '' ? null : Number(event.target.value);
  renderNeeded();
  renderPreview();
  scheduleSave();
});

document.getElementById('bid').addEventListener('input',event=>{
  state.draft.bid = nullableNumber(event.target.value);
  renderNeeded();
  renderPreview();
  scheduleSave();
});

document.getElementById('trump').addEventListener('change',event=>{
  state.draft.trump = event.target.value;
  scheduleSave();
});

document.getElementById('thrown').addEventListener('change',event=>{
  state.draft.thrown = event.target.checked;
  if(state.draft.thrown) state.draft.tricks = Array(MAX_PLAYERS).fill(null);
  autoTrickIndex = null;
  renderRoundForm();
  scheduleSave();
});

document.getElementById('roundForm').addEventListener('submit',event=>{
  event.preventDefault();
  saveDraft();
});

document.getElementById('clearRound').addEventListener('click',clearDraft);
document.getElementById('cancelEdit').addEventListener('click',cancelEdit);
document.getElementById('themeBtn').addEventListener('click',()=>{
  darkMode = !darkMode;
  applyTheme();
  saveDarkMode();
});
document.getElementById('printBtn').addEventListener('click',()=>window.print());
document.getElementById('exportBtn').addEventListener('click',exportData);
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('finishBtn').addEventListener('click',finishGame);
document.getElementById('importFile').addEventListener('change',event=>{
  const file = event.target.files[0];
  if(file) importData(file);
  event.target.value = '';
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm('Start a new Pinochle game without adding this game to history?')) return;
  state = defaultState();
  autoTrickIndex = null;
  render();
  saveNow();
  toast('Scorecard reset');
});

document.getElementById('history').addEventListener('click',event=>{
  const button = event.target.closest('button[data-edit]');
  if(!button) return;
  const index = Number(button.dataset.edit);
  state.editingIndex = index;
  state.draft = normalizeRound(state.rounds[index]);
  autoTrickIndex = null;
  render();
  document.getElementById('roundForm').scrollIntoView({behavior:'smooth', block:'start'});
  scheduleSave();
});

document.getElementById('gameHistory').addEventListener('click',event=>{
  const restoreButton = event.target.closest('button[data-restore-game]');
  const deleteButton = event.target.closest('button[data-delete-game]');
  if(restoreButton){
    restoreArchivedGame(restoreButton.dataset.restoreGame);
  }else if(deleteButton){
    deleteArchivedGame(deleteButton.dataset.deleteGame);
  }
});
document.getElementById('clearHistoryBtn').addEventListener('click',clearGameArchive);

render();
saveNow();
</script>
</body>
</html>
