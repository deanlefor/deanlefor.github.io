name: Test and deploy deanlefor.com

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/fers-retirement/package-lock.json

      - name: Install calculator dependencies
        run: npm ci
        working-directory: apps/fers-retirement

      - name: Test calculator
        run: npm test
        working-directory: apps/fers-retirement

      - name: Build calculator
        run: npm run build
        working-directory: apps/fers-retirement

      - name: Assemble website
        run: |
          mkdir -p _site/fers-retirement
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.DS_Store' \
            --exclude '.pnpm-store/' \
            --exclude '_site/' \
            --exclude 'apps/' \
            ./ _site/
          cp -R apps/fers-retirement/dist/. _site/fers-retirement/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
