<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAPA PhD Tracker — Dean Lefor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <style>
    :root {
      --bg1:#1c1c1b;--bg2:#262625;--bg3:#303030;
      --tx1:#f0efee;--tx2:#8c8c8a;--tx3:#5c5c5a;
      --bd1:rgba(255,255,255,0.09);--bd2:rgba(255,255,255,0.18);
      --rm:8px;--rl:12px;--mono:'Courier New',Courier,monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;color:var(--tx1)}
    #app{max-width:720px;margin:0 auto;background:var(--bg1);min-height:100vh}
    .topbar{background:var(--topbar-bg);border-bottom:0.5px solid var(--bd1);padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
    .topbar a{font-size:12px;color:var(--topbar-link);text-decoration:none}
    .topbar a:hover{color:var(--topbar-tx)}
    .hdr{background:var(--bg2);border-bottom:0.5px solid var(--bd1);padding:14px 18px 0}
    .tabs{display:flex;gap:2px;margin-top:10px}
    .tab{padding:7px 13px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--tx2);border-radius:6px 6px 0 0}
    .tab.on{background:var(--bg1);color:var(--tx1);border-top:2px solid var(--accent);border-left:0.5px solid var(--bd1);border-right:0.5px solid var(--bd1)}
    .body{padding:14px 16px 60px}
    .card{background:var(--bg1);border:0.5px solid var(--bd1);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px}
    .csec{background:var(--bg2);border:0.5px solid var(--bd1);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px}
    .track{background:var(--bg2);border-radius:99px;height:5px;overflow:hidden;margin-top:4px}
    .fill{height:100%;border-radius:99px;transition:width .4s}
    .btn{background:var(--bg2);border:0.5px solid var(--bd2);border-radius:var(--rm);padding:5px 11px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx1)}
    .btn:hover{background:var(--bg3)}
    .bsm{background:transparent;border:0.5px solid var(--bd2);border-radius:var(--rm);padding:3px 9px;font-size:11px;font-weight:500;cursor:pointer;color:var(--tx2)}
    .bsm:hover{background:var(--bg2)}
    .pill{padding:4px 10px;font-size:12px;font-weight:500;border:0.5px solid var(--bd2);border-radius:99px;cursor:pointer;background:transparent;color:var(--tx2)}
    .pill.on{background:var(--accent);border-color:var(--accent);color:#fff}
    .chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:0.5px solid var(--bd1);border-radius:var(--rm);padding:4px 8px;font-size:12px;margin:3px 3px 3px 0}
    .cx{background:none;border:none;cursor:pointer;color:var(--tx2);font-size:13px;padding:0 1px;line-height:1}
    .cx:hover{color:var(--tx1)}
    .chk{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--bd2);background:var(--bg1);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .chk.on{background:#639922;border-color:#639922}
    .circ{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--accent);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .circ.on{background:#639922;border-color:#639922}
    .pcourse{display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:var(--rm);cursor:pointer}
    .pcourse:hover{background:var(--bg2)}
    .ahdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;padding-bottom:6px}
    .crow{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--bd1);cursor:pointer}
    .crow:last-child{border-bottom:none}
    .code{font-size:10px;font-family:var(--mono);background:var(--bg2);padding:1px 5px;border-radius:3px;color:var(--tx2);font-weight:500}
    .tag{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .picker{border-top:0.5px solid var(--bd1);margin-top:10px;padding-top:10px}
    .srow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .srow:last-child{margin-bottom:0}
    .slbl{font-size:12px;color:var(--tx2);min-width:120px;font-weight:500}
    @media(max-width:480px){.g2{grid-template-columns:1fr}.tab{padding:7px 9px;font-size:12px}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const BL='#378ADD',GR='#639922',AM='#BA7517';
const KEY='phd-tracker-v2';
const VERSION='v1.01';

const DISCLAIMER=`This tracker is built from the November 2024 CPAP Policy Guide and the April 2026 Qualifying Examination & Constellations update (approved April 23, 2026). It is meant for planning and tracking only — not an official advising tool. There may be errors or omissions, and program requirements do change. Always confirm your plan with your advisor and the VT Graduate School.\n\nThis tool is not affiliated with or endorsed by Virginia Tech. If you spot something wrong, please let me know and I will fix it.\n\nThe constellation-based QE process replaced the prior 3-of-5-fields exam. Students who started before April 2026 should confirm which QE procedures apply to them.\n\nFor safety and security reasons, none of this is stored on a server. I do not see your data and it is not saved anywhere other than on your computer. However, since your progress is saved in your browser’s local storage it will disappear if you clear your browser data or use private/incognito mode. Please ensure you do backup (settings page) and save the .json file somewhere safe. I CANNOT RECOVER PROGRESS ON YOUR BEHALF.\n\nFinally, if you do not graduate because a website told you that you had enough credits: not liable. 🙂`;

const STATIC_BUCKETS=[
  {id:'foundation',name:'Foundation courses',req:18,sub:'6 courses across the 5 core fields',courses:[
    {id:'f1',code:'PAPA 6014',name:'PA theory and context',cr:3,tag:'Theory',tc:'#7C3AED'},
    {id:'f2',code:'PAPA 6114',name:'Complex public organizations',cr:3,tag:'Orgs',tc:'#1D4ED8'},
    {id:'f3',code:'PAPA 6214',name:'Public policy processes',cr:3,tag:'Policy',tc:'#0369A1'},
    {id:'f4',code:'PAPA 6224',name:'Public policy design',cr:3,tag:'Policy',tc:'#0369A1'},
    {id:'f5',code:'PAPA 6344',name:'Leadership and management in PA',cr:3,tag:'Mgmt',tc:'#15803D'},
    {id:'f6',code:'PAPA 6414',name:'Normative foundations of PA',cr:3,tag:'Ethics',tc:'#B45309'},
  ]},
  {id:'methods',name:'Research foundations & methods',req:9,sub:'Cornerstone · inquiry · advanced techniques',courses:[
    {id:'m1',code:'PAPA 6294',name:'Cornerstone seminar',cr:3,tag:'Req',tc:BL,note:'First year required'},
    {id:'m2',code:'PAPA 6514',name:'PA and policy inquiry',cr:3,tag:'Req',tc:BL,note:'Required before qualifying exam'},
    {id:'m3',code:'TBD',name:'Advanced methods (advisor-approved)',cr:3,tag:'Flex',tc:AM,note:'Quantitative or qualitative techniques'},
  ]},
  {id:'conc',name:'Research concentration',req:9,sub:'Independent studies · AT courses · field work',courses:[
    {id:'c1',code:'PAPA 5974/AT',name:'Concentration study 1',cr:3,tag:'Flex',tc:AM},
    {id:'c2',code:'PAPA 5974/AT',name:'Concentration study 2',cr:3,tag:'Flex',tc:AM},
    {id:'c3',code:'PAPA 5974/AT',name:'Concentration study 3',cr:3,tag:'Flex',tc:AM},
  ]},
  {id:'lecture',name:'Concentration lecture',req:3,sub:'After 9 concentration hours · before prospectus',courses:[
    {id:'l1',code:'PAPA 7964',name:'Concentration lecture',cr:3,tag:'Req',tc:BL,note:'Deadline: Dec 1 (fall) / May 1 (spring). Audience of 6+.'},
  ]},
  {id:'capstone',name:'Capstone seminar',req:3,sub:'Final semester of coursework',courses:[
    {id:'k1',code:'PAPA 6394',name:'Capstone seminar',cr:3,tag:'Req',tc:BL,note:'Preferably the last semester of coursework'},
  ]},
  {id:'dissertation',name:'Dissertation',req:30,sub:'PAPA 7994 · 10 × 3 credits · assign to semesters',courses:[
    {id:'d1',code:'PAPA 7994',name:'Dissertation 1',cr:3,tag:'Diss',tc:'#2563EB',renameable:true},
    {id:'d2',code:'PAPA 7994',name:'Dissertation 2',cr:3,tag:'Diss',tc:'#2563EB',renameable:true},
    {id:'d3',code:'PAPA 7994',name:'Dissertation 3',cr:3,tag:'Diss',tc:'#2563EB',renameable:true},
    {id:'d4',code:'PAPA 7994',name:'Dissertation 4',cr:3,tag:'Diss',tc:'#2563EB',renameable:true},
    {id:'d5',code:'PAPA 7994',name:'Dissertation 5',cr:3,tag:'Diss',tc:'#2563EB',renameable:true},
    {id:'d6',code:'PAPA 7994',name:'Dissertation 6',cr:3,tag:'Diss',tc:'#2563EB',renameable:true},
    {id:'d7',code:'PAPA 7994',name:'Dissertation 7',cr:3,tag:'Diss',tc:'#2563EB',renameable:true},
    {id:'d8',code:'PAPA 7994',name:'Dissertation 8',cr:3,tag:'Diss',tc:'#2563EB',renameable:true},
    {id:'d9',code:'PAPA 7994',name:'Dissertation 9',cr:3,tag:'Diss',tc:'#2563EB',renameable:true},
    {id:'d10',code:'PAPA 7994',name:'Dissertation 10',cr:3,tag:'Diss',tc:'#2563EB',renameable:true},
  ]},
];

const MILESTONES=[
  {id:'ms1',name:'Scholarly ethics quiz',target:'Year 1 (early)',desc:'Pass the CPAP ethics quiz. Review Roig guide, COPE guidelines, and ASPA Code of Ethics. Verified at Plan of Study submission.'},
  {id:'ms2',name:'CITI human subjects training',target:'Year 1',desc:'Complete VT IRB certification. Required for PhD; documented on Plan of Study.'},
  {id:'ms3',name:'Plan of study submitted',target:'Before 24 credits',desc:'File before completing 24 semester hours. Signed by committee, submitted to Graduate School.'},
  {id:'ms4',name:'Constellation selected',target:'Before QE registration',desc:'Choose one of four constellations: I (Public Management: Management & Leadership + Complex Organizations), II (PA Foundations: Theory & Context + Normative Foundations), III (Public Policy: Policy Process + Policy Design + Policy Inquiry), or IV (Custom: any two courses from Constellations I–III). Must complete all constellation courses and at least 5 of 7 total foundation courses before the exam.'},
  {id:'ms5',name:'QE request submitted',target:'By May 1 (June 1 in 2026 only)',desc:'Submit \"Request to Admit Candidate to Qualifying Examination\" to the CPAP office by May 1. Missing this deadline means waiting a full year — the exam is offered once annually in August only.'},
  {id:'ms6',name:'Submitted papers ready',target:'By August 1',desc:'Prepare at least 2 papers from constellation courses (up to 4 total, including papers from other foundation courses). Papers are evaluated alongside the Foundations Essay and oral engagement.'},
  {id:'ms7',name:'Foundations essay completed',target:'By August 1',desc:'Write a 2,000–2,500 word essay (double-spaced, excluding references) synthesizing and critically assessing scholarship from submitted papers. Must be completed independently — working with your advisor or any faculty member on this essay is not permitted.'},
  {id:'ms8',name:'QE oral engagement',target:'August, before Fall semester',desc:'15-minute in-person presentation of the Foundations Essay followed by 30-minute Q&A with a 3-faculty committee from your selected constellation. Committee may also ask about broader constellation scholarship.'},
  {id:'ms9',name:'Qualifying examination passed',target:'August result',desc:'Committee evaluates submitted papers, essay, and oral engagement as a whole. Outcome is Pass or Fail. A minor deficiency may result in an additional 30-minute Q&A within 2 weeks. A failed exam may be retaken the following January or August; the second attempt must occur within one calendar year.'},
  {id:'ms10',name:'Dissertation committee formed',target:'After qualifying exam',desc:'4 members minimum; at least 3 must be CPAP core faculty. Chair must be core faculty. Graduate School approval required.'},
  {id:'ms11',name:'Concentration lecture delivered',target:'Before Dec 1 (fall) or May 1 (spring)',desc:'Integrates 9 research concentration hours. Audience of at least 6 required. Must occur before prospectus defense. Cannot be scheduled during summer. Student is responsible for assembling the audience.'},
  {id:'ms12',name:'Capstone seminar completed',target:'Preferably last semester of coursework',desc:'PAPA 6394. Focuses on developing and refining the dissertation prospectus proposal.'},
  {id:'ms13',name:'Prospectus defense (preliminary exam)',target:'After all coursework',desc:'File \"Request to Admit to Preliminary Examination.\" Full committee reviews and approves research design including topic, significance, methodology, and timeline.'},
  {id:'ms14',name:'Dissertation draft distributed',target:'At least 6 weeks before defense',desc:'Defense cannot be scheduled until at least 6 weeks after the chair-approved draft is distributed to all committee members.'},
  {id:'ms15',name:'Dissertation defense (final exam)',target:'Final requirement',desc:'File \"Request to Admit to Final Exam.\" All committee members must be present. Be prepared to discuss theoretical, methodological, and practical implications of the dissertation.'},
];


const THEMES={
  dark:{
    '--bg1':'#1c1c1b','--bg2':'#262625','--bg3':'#303030',
    '--tx1':'#f0efee','--tx2':'#8c8c8a','--tx3':'#5c5c5a',
    '--bd1':'rgba(255,255,255,0.09)','--bd2':'rgba(255,255,255,0.18)',
    '--accent':'#378ADD','--topbar-bg':'#262625','--topbar-tx':'#f0efee','--topbar-link':'#8c8c8a'
  },
  light:{
    '--bg1':'#ffffff','--bg2':'#f5f1f2','--bg3':'#ece6e8',
    '--tx1':'#1a1414','--tx2':'#5c5254','--tx3':'#8c8587',
    '--bd1':'rgba(134,31,65,0.12)','--bd2':'rgba(134,31,65,0.28)',
    '--accent':'#E5751F','--topbar-bg':'#861F41','--topbar-tx':'#ffffff','--topbar-link':'rgba(255,255,255,0.75)'
  }
};
function applyTheme(){
  const t=THEMES[s.darkMode?'dark':'light'];
  for(const[k,v] of Object.entries(t)) document.documentElement.style.setProperty(k,v);
}
let s={
  tab:'dashboard',done:new Set(),mdone:new Set(),
  dmp:0,open:new Set(['foundation','methods','electives','dissertation']),
  assign:{},picker:null,showSettings:false,
  startSem:'fall',startYear:2025,names:{},renaming:null,termDone:new Set(),
  shareLinkCopied:false,darkMode:false,readOnly:false,
  userName:'',userEmail:''
};

// Dynamic term generation
function genTerms(){
  const terms=[];
  let y=s.startYear,sg=s.startSem,sn=1;
  while(terms.length<15){
    if(sg==='fall'){
      terms.push({id:`f${y}`,name:`Fall ${y}`,label:`Sem ${sn}`,type:'sem'});
      sn++;sg='spring';y++;
    } else {
      terms.push({id:`s${y}`,name:`Spring ${y}`,label:`Sem ${sn}`,type:'sem'});
      sn++;
      if(terms.length<15) terms.push({id:`u${y}`,name:`Summer ${y}`,type:'summer'});
      sg='fall';
    }
  }
  return terms.slice(0,15);
}

// Dynamic electives bucket
function getElecBucket(){
  const courses=[];
  for(let i=1;i<=6;i++) courses.push({id:`el${i}`,code:'Elective',name:`Elective ${i}`,cr:3,tag:'Sched',tc:'#6B7280',note:'Any CPAP, SPIA, or related graduate course',renameable:true});
  return{id:'electives',name:'Electives',req:18,sub:'6 elective courses · schedule or transfer in',courses};
}

function allBuckets(){return[...STATIC_BUCKETS,getElecBucket()];}
function allCourses(){return allBuckets().flatMap(b=>b.courses.map(c=>({...c,bid:b.id})));}
function validTids(){return new Set(genTerms().map(t=>t.id));}
function tcourses(tid){return allCourses().filter(c=>s.assign[c.id]===tid);}
function isDone(id){return s.done.has(id)||s.assign[id]==='_transfer';}
function dname(c){return s.names[c.id]||c.name;}
function unas(){const vt=validTids();return allCourses().filter(c=>!c.locked&&(!s.assign[c.id]||(!vt.has(s.assign[c.id])&&s.assign[c.id]!=='_transfer')));}
function bp(){return allBuckets().map(b=>({...b,earned:Math.min(b.req,b.courses.reduce((a,c)=>isDone(c.id)?a+c.cr:a,0))}));}
function tot(){const p=bp();const diss=p.find(b=>b.id==='dissertation')?.earned||0;const cw=p.filter(b=>b.id!=='dissertation').reduce((a,b)=>a+b.earned,0);return{p,cw,diss,total:cw+diss};}

// Storage
function load(){
  try{
    const r=localStorage.getItem(KEY);
    if(r){const d=JSON.parse(r);
      if(d.done)s.done=new Set(d.done);
      if(d.mdone)s.mdone=new Set(d.mdone);
      if(d.dmp!==undefined)s.dmp=d.dmp;
      if(d.assign)s.assign=d.assign;
      if(d.names)s.names=d.names;
      if(d.termDone)s.termDone=new Set(d.termDone);
      if(d.darkMode!==undefined)s.darkMode=d.darkMode;
      if(d.startSem)s.startSem=d.startSem;
      if(d.startYear)s.startYear=d.startYear;
      if(d.userName!==undefined)s.userName=d.userName;
      if(d.userEmail!==undefined)s.userEmail=d.userEmail;
    }
  }catch(e){}
  if(Object.keys(s.assign).length===0) s.assign={};
  // Check for shared state in URL hash
  try{
    const hash=window.location.hash;
    if(hash.startsWith('#view=')){
      const d=JSON.parse(decodeURIComponent(atob(hash.slice(6))));
      if(d.done)s.done=new Set(d.done);
      if(d.mdone)s.mdone=new Set(d.mdone);
      if(d.dmp!==undefined)s.dmp=d.dmp;
      if(d.assign)s.assign=d.assign;
      if(d.names)s.names=d.names;
      if(d.termDone)s.termDone=new Set(d.termDone);
      if(d.startSem)s.startSem=d.startSem;
      if(d.startYear)s.startYear=d.startYear;
      if(d.darkMode!==undefined)s.darkMode=d.darkMode;
      if(d.userName!==undefined)s.userName=d.userName;
      if(d.userEmail!==undefined)s.userEmail=d.userEmail;
      s.readOnly=true;
    }
  }catch(e){}
  applyTheme();
  R();
}

function sv(){if(s.readOnly)return;try{localStorage.setItem(KEY,JSON.stringify({done:[...s.done],mdone:[...s.mdone],dmp:s.dmp,assign:s.assign,names:s.names,termDone:[...s.termDone],startSem:s.startSem,startYear:s.startYear,darkMode:s.darkMode,userName:s.userName,userEmail:s.userEmail}));}catch(e){}}

// Render helpers
function bar(v,m){const pct=Math.min(v/m*100,100),col=v>=m?GR:'var(--accent)';return`<div class="track"><div class="fill" style="width:${pct}%;background:${col}"></div></div>`;}

function ring(v,m){
  const sz=118,sw=10,r=(sz-sw)/2,c2=2*Math.PI*r,off=c2*(1-Math.min(v/m,1)),col=v>=m?GR:'var(--accent)';
  return`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--bg2)" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${c2}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset .5s"/></svg>`;
}

function ck(){return`<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}

// Settings panel
function rSettings(){
  return`<div class="csec" style="margin-bottom:14px;border:1px solid ${BL}55">
    <div style="font-size:13px;font-weight:500;margin-bottom:12px">Program settings</div>
    <div class="srow" style="margin-bottom:8px">
      <span class="slbl">Your name</span>
      <input type="text" value="${s.userName.replace(/"/g,'&quot;')}" oninput="s.userName=this.value;sv()" placeholder="e.g. Herbert Simon" style="flex:1;font-size:12px;padding:5px 8px;border:0.5px solid var(--bd2);border-radius:var(--rm);background:var(--bg1);color:var(--tx1);outline:none">
    </div>
    <div class="srow" style="margin-bottom:10px">
      <span class="slbl">Email</span>
      <input type="email" value="${s.userEmail.replace(/"/g,'&quot;')}" oninput="s.userEmail=this.value;sv()" placeholder="e.g. hsimon@vt.edu" style="flex:1;font-size:12px;padding:5px 8px;border:0.5px solid var(--bd2);border-radius:var(--rm);background:var(--bg1);color:var(--tx1);outline:none">
    </div>
    <div class="srow">
      <span class="slbl">Start semester</span>
      <div style="display:flex;gap:4px">
        ${['fall','spring'].map(o=>`<button class="pill ${s.startSem===o?'on':''}" onclick="setStart('${o}',${s.startYear})">${o[0].toUpperCase()+o.slice(1)}</button>`).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn" style="padding:4px 10px" onclick="setStart('${s.startSem}',${s.startYear-1})" ${s.startYear<=2022?'disabled':''}>&#8722;</button>
        <span style="font-size:13px;font-weight:500;min-width:38px;text-align:center">${s.startYear}</span>
        <button class="btn" style="padding:4px 10px" onclick="setStart('${s.startSem}',${s.startYear+1})" ${s.startYear>=2027?'disabled':''}>+</button>
      </div>
    </div>
    <div class="srow" style="margin-top:8px">
      <span class="slbl">Appearance</span>
      <div style="display:flex;gap:4px">
        <button class="pill ${!s.darkMode?'on':''}" onclick="setTheme(false)">Light</button>
        <button class="pill ${s.darkMode?'on':''}" onclick="setTheme(true)">Dark</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--tx3);margin-top:2px">Changing start semester preserves your existing course assignments where possible.</div>
    <div style="border-top:0.5px solid var(--bd1);padding-top:10px;margin-top:10px">
      <div style="font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:8px">Share &amp; export</div>
      <div style="font-size:11px;color:var(--tx3);margin-bottom:8px">Share a read-only link with your advisor, or export a printable PDF report.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="copyShareLink()">${s.shareLinkCopied?'&#10003; Link copied!':'Copy share link'}</button>
        <button class="btn" onclick="openPrintView()">Print / Save as PDF</button>
      </div>
    </div>
    <div style="border-top:0.5px solid var(--bd1);padding-top:10px;margin-top:10px">
      <div style="font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:8px">Backup &amp; restore</div>
      <div style="font-size:11px;color:var(--tx3);margin-bottom:8px">Save a backup file to your device and reload it any time — even months later.</div>

// Event handlers
function ST(t){s.tab=t;s.picker=null;R();}
function tog(id){s.open.has(id)?s.open.delete(id):s.open.add(id);R();}
function ctog(id){s.done.has(id)?s.done.delete(id):s.done.add(id);sv();R();}
function mtog(id){s.mdone.has(id)?s.mdone.delete(id):s.mdone.add(id);sv();R();}
function adj(d){s.dmp=Math.min(15,Math.max(0,s.dmp+d));sv();R();}
function asgn(cid,tid){s.assign[cid]=tid;s.picker=null;sv();R();}
function una(cid){delete s.assign[cid];sv();R();}
function opk(tid){s.picker=tid;R();}
function cpk(){s.picker=null;R();}
function toggleSt(){s.showSettings=!s.showSettings;R();}

function toggleTermDone(id){s.termDone.has(id)?s.termDone.delete(id):s.termDone.add(id);sv();R();}

function stateData(){
  return JSON.stringify({done:[...s.done],mdone:[...s.mdone],dmp:s.dmp,assign:s.assign,names:s.names,termDone:[...s.termDone],startSem:s.startSem,startYear:s.startYear,darkMode:s.darkMode});
}

function downloadBackup(){
  const date=new Date().toISOString().slice(0,10);
  const blob=new Blob([stateData()],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`phd-tracker-${date}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function loadFromFile(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.done)s.done=new Set(d.done);
      if(d.mdone)s.mdone=new Set(d.mdone);
      if(d.dmp!==undefined)s.dmp=d.dmp;
      if(d.assign)s.assign=d.assign;
      if(d.names)s.names=d.names;
      if(d.termDone)s.termDone=new Set(d.termDone);
      if(d.startSem)s.startSem=d.startSem;
      if(d.startYear)s.startYear=d.startYear;
      if(d.darkMode!==undefined)s.darkMode=d.darkMode;
      input.value='';
      sv();applyTheme();R();
    }catch(e){alert('Could not read that file. Make sure it is a valid tracker backup (.json).');}
  };
  reader.readAsText(file);
}

function resetAll(){
  if(!confirm('Reset all progress?\n\nThis will clear all completed courses, milestones, DMP sessions, semester assignments, and custom names.\n\nYour name, email, start semester, and appearance settings will be kept.\n\nThis cannot be undone.'))return;
  s.done=new Set();
  s.mdone=new Set();
  s.dmp=0;
  s.assign={};
  s.names={};
  s.termDone=new Set();
  s.open=new Set(['foundation','methods','electives','dissertation']);
  sv();R();
}


function setTheme(dark){s.darkMode=dark;applyTheme();sv();R();}

function setStart(sem,year){
  if(year<2022||year>2027)return;
  s.startSem=sem;s.startYear=year;
  sv();R();
}

function startRename(id){s.renaming=id;R();}
function cancelRename(){s.renaming=null;R();}
function saveRename(){
  const inp=document.getElementById('rename-inp');
  if(inp){
    const v=inp.value.trim();
    if(v)s.names[s.renaming]=v;
    else delete s.names[s.renaming];
  }
  s.renaming=null;sv();R();
}

function copyShareLink(){
  const data=JSON.stringify({done:[...s.done],mdone:[...s.mdone],dmp:s.dmp,assign:s.assign,names:s.names,termDone:[...s.termDone],startSem:s.startSem,startYear:s.startYear,darkMode:s.darkMode,userName:s.userName,userEmail:s.userEmail});
  const url=window.location.origin+window.location.pathname+'#view='+btoa(encodeURIComponent(data));
  navigator.clipboard.writeText(url).then(()=>{
    s.shareLinkCopied=true;R();
    setTimeout(()=>{s.shareLinkCopied=false;R();},2500);
  }).catch(()=>prompt('Copy this share link:',url));
}

  const w=window.open('','_blank');
  w.document.write(generatePrintHTML());
  w.document.close();
}

function generatePrintHTML(){
  const{p,cw,diss,total}=tot();
  const terms=genTerms();
  const xferCourses=allCourses().filter(c=>s.assign[c.id]==='_transfer');
  const dateStr=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const startLabel=s.startSem[0].toUpperCase()+s.startSem.slice(1)+' '+s.startYear;

  const semRows=terms.map(tm=>{
    const tc=tcourses(tm.id);
    if(!tc.length)return'';
    const doneT=s.termDone.has(tm.id);
    return`<tr style="background:${doneT?'#f0fff4':'white'}">
      <td style="padding:6px 8px;font-weight:600;white-space:nowrap;border-left:3px solid ${doneT?'#639922':'#E5751F'};font-size:11px">${tm.name}${tm.label?` <span style="font-weight:400;color:#888;font-size:10px">(${tm.label})</span>`:''}</td>
      <td style="padding:6px 8px">${tc.map(c=>`<div style="font-size:11px;color:#1a1a1a">${c.code} — ${dname(c)}</div>`).join('')}</td>
      <td style="padding:6px 8px;text-align:right;color:#861F41;font-weight:600;font-size:11px;white-space:nowrap">${tc.reduce((a,c)=>a+c.cr,0)} cr.</td>
      <td style="padding:6px 8px;text-align:center;font-size:13px;color:#639922">${doneT?'✓':''}</td>
    </tr>`;
  }).join('');

  const courseList=p.map(b=>`<div style="margin-bottom:14px;break-inside:avoid">
    <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#861F41;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #E5751F">${b.name} · ${b.earned}/${b.req} cr.</div>
    ${b.courses.map(c=>{const done=isDone(c.id);return`<div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:.5px solid #f0f0f0">
      <div style="width:13px;height:13px;border-radius:3px;border:1.5px solid ${done?'#639922':'#ccc'};background:${done?'#639922':'white'};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:white">${done?'✓':''}</div>
      <span style="font-size:10px;font-family:monospace;background:#f5f5f5;padding:1px 4px;border-radius:2px;color:#666;flex-shrink:0">${c.code}</span>
      <span style="font-size:11px;flex:1;color:${done?'#aaa':'#1a1a1a'};${done?'text-decoration:line-through':''}">${dname(c)}</span>
      <span style="font-size:10px;color:#861F41;font-weight:600">${c.cr} cr.</span>
    </div>`;}).join('')}
  </div>`).join('');

  const mileRows=MILESTONES.map(m=>{const done=s.mdone.has(m.id);return`<div style="display:flex;gap:10px;padding:5px 0;border-bottom:.5px solid #eee;align-items:flex-start">
    <div style="width:15px;height:15px;border-radius:50%;border:1.5px solid ${done?'#639922':'#861F41'};background:${done?'#639922':'white'};flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:white">${done?'✓':''}</div>
    <div><div style="font-size:11px;font-weight:600;color:${done?'#aaa':'#1a1a1a'};${done?'text-decoration:line-through':''}">${m.name}</div><div style="font-size:10px;color:#E5751F;margin-top:1px">${m.target}</div></div>
  </div>`;}).join('');

  return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>PAPA PhD Progress Report — ${startLabel}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:white}
  .no-print{background:#E5751F;color:white;padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
  .no-print button{background:white;color:#E5751F;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer}
  .sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#861F41;border-bottom:1.5px solid #861F41;padding-bottom:4px;margin-bottom:12px}
  @media print{.no-print{display:none}header,tr,td{-webkit-print-color-adjust:exact;print-color-adjust:exact}.page-break{page-break-before:always}}
  </style></head><body>
  <div class="no-print"><span style="font-size:12px;font-weight:500">Use your browser's print dialog (Ctrl+P / Cmd+P) to print or save as PDF</span><button onclick="window.print()">Print / Save PDF</button></div>
  <header style="background:#861F41;color:white;padding:20px 28px">
    <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;opacity:.7;margin-bottom:4px">Virginia Tech · Center for Public Administration and Policy</div>
    <div style="font-size:22px;font-weight:700">PAPA PhD Progress Report</div>
    ${s.userName||s.userEmail?`<div style="font-size:13px;font-weight:500;margin-top:5px;opacity:.95">${[s.userName,s.userEmail].filter(Boolean).join(' · ')}</div>`:''}
    <div style="font-size:11px;opacity:.8;margin-top:4px">Start: ${startLabel} · Generated ${dateStr}</div>
  </header>
  <div style="padding:20px 28px">
    <div style="margin-bottom:24px">
      <div class="sec-title">Progress summary</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${[{l:'Total credits',v:total,m:90},{l:'Coursework',v:cw,m:60},{l:'Dissertation',v:diss,m:30},{l:'DMP sessions',v:s.dmp,m:15}].map(x=>`<div style="text-align:center;padding:10px;background:#f5f1f2;border-radius:6px"><div style="font-size:24px;font-weight:700;color:${x.v>=x.m?'#639922':'#861F41'}">${x.v}</div><div style="font-size:10px;color:#666;margin-top:1px">${x.l}</div><div style="font-size:10px;color:#999">of ${x.m}</div></div>`).join('')}
      </div>
    </div>
    <div style="margin-bottom:24px">
      <div class="sec-title">Semester plan</div>
      ${xferCourses.length?`<div style="margin-bottom:8px;padding:8px 10px;background:#fff8f0;border-left:3px solid #E5751F;border-radius:3px"><div style="font-size:10px;font-weight:600;color:#E5751F;margin-bottom:3px">Transfer in</div>${xferCourses.map(c=>`<div style="font-size:11px">${c.code} — ${dname(c)} · ${c.cr} cr.</div>`).join('')}</div>`:''}
      ${semRows?`<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f5f1f2"><th style="padding:6px 8px;text-align:left;font-size:10px;color:#666;font-weight:600;text-transform:uppercase">Term</th><th style="padding:6px 8px;text-align:left;font-size:10px;color:#666;font-weight:600;text-transform:uppercase">Courses</th><th style="padding:6px 8px;text-align:right;font-size:10px;color:#666;font-weight:600;text-transform:uppercase">Cr.</th><th style="padding:6px 8px;text-align:center;font-size:10px;color:#666;font-weight:600;text-transform:uppercase">Done</th></tr></thead><tbody>${semRows}</tbody></table>`:'<div style="font-size:12px;color:#999;padding:8px 0">No courses scheduled yet.</div>'}
    </div>
    <div class="page-break" style="margin-bottom:24px">
      <div class="sec-title">Course completion</div>
      <div style="columns:2;column-gap:24px">${courseList}</div>
    </div>
    <div style="margin-bottom:24px">
      <div class="sec-title">Milestones</div>
      ${mileRows}
    </div>
    <div style="font-size:10px;color:#aaa;border-top:1px solid #eee;padding-top:10px;margin-top:8px">Generated by PAPA PhD Tracker · deanlefor.com/tracker.html · For planning purposes only — confirm all requirements with your advisor and the VT Graduate School.</div>
  </div></body></html>`;
}

load();
</script>
</body>
</html>
