<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinochle Score Keeper</title>
<style>
*{box-sizing:border-box}
:root{
  --ink:#1f2420;
  --muted:#69736c;
  --paper:#f5f2eb;
  --panel:#fffdf8;
  --soft:#ebe4d8;
  --line:#d3cab9;
  --green:#2f684d;
  --green-dark:#214c38;
  --gold:#b8892f;
  --red:#a33b32;
  --blue:#2f5f8c;
  --shadow:0 12px 34px rgba(38,32,22,.1);
}
body{
  margin:0;
  min-height:100vh;
  background:var(--paper);
  color:var(--ink);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
button,input,select{font:inherit}
button{cursor:pointer}
.wrap{max-width:1320px;margin:0 auto;padding:18px}
.top{
  display:grid;
  grid-template-columns:1fr auto;
  gap:14px;
  align-items:end;
  margin-bottom:14px;
}
.brand h1{margin:0;font-size:clamp(1.55rem,3vw,2.35rem);letter-spacing:.02em}
.brand p{margin:4px 0 0;color:var(--muted);font-size:.9rem}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
.layout{display:grid;grid-template-columns:minmax(360px,.95fr) minmax(460px,1.15fr);gap:14px;align-items:start}
.stack{display:flex;flex-direction:column;gap:14px}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
}
.section{padding:14px}
.section-title{
  margin:0 0 12px;
  font-size:1rem;
  font-weight:800;
  letter-spacing:.02em;
}
.settings{
  display:grid;
  grid-template-columns:minmax(180px,1fr) auto minmax(140px,.45fr);
  gap:10px;
  align-items:end;
}
.field{display:flex;flex-direction:column;gap:5px;min-width:0}
label,.label{
  color:var(--muted);
  font-size:.72rem;
  font-weight:800;
  letter-spacing:.07em;
  text-transform:uppercase;
}
input,select{
  width:100%;
  min-height:38px;
  border:1px solid var(--line);
  border-radius:6px;
  background:#fff;
  color:var(--ink);
  padding:8px 10px;
  outline:none;
}
input:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(47,104,77,.12)}
input[type=number]{text-align:right}
.seg{
  display:flex;
  border:1px solid var(--line);
  border-radius:7px;
  overflow:hidden;
  background:#fff;
}
.seg button{
  min-width:44px;
  min-height:38px;
  padding:7px 12px;
  border:0;
  border-right:1px solid var(--line);
  background:#fff;
  color:var(--ink);
  font-weight:800;
}
.seg button:last-child{border-right:0}
.seg button.active{background:var(--green);color:#fff}
.btn{
  min-height:38px;
  border:1px solid var(--line);
  border-radius:6px;
  background:#fff;
  color:var(--ink);
  padding:8px 12px;
  font-weight:800;
}
.btn:hover{border-color:#948873}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{background:var(--green-dark)}
.btn.warn{color:var(--red)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.45;cursor:not-allowed}
.round-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  margin-bottom:12px;
}
.round-head h2{margin:0;font-size:1.25rem}
.save-state{font-size:.8rem;color:var(--muted);white-space:nowrap}
.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.score-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.player-count-2 .score-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
.score-matrix{
  display:grid;
  grid-template-columns:76px repeat(3,minmax(0,1fr));
  gap:8px;
  align-items:end;
}
.player-count-2 .score-matrix{grid-template-columns:76px repeat(2,minmax(0,1fr))}
.score-matrix .matrix-label{
  align-self:center;
  color:var(--muted);
  font-size:.76rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.score-matrix .matrix-head{
  color:var(--muted);
  font-size:.8rem;
  font-weight:900;
  overflow:hidden;
  text-align:center;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.score-matrix input{font-size:1.2rem;font-weight:900;text-align:center}
.divider{height:1px;background:var(--line);margin:14px 0}
.checks{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.check{
  display:inline-flex;
  gap:8px;
  align-items:center;
  min-height:38px;
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:7px;
  background:#fff;
  font-weight:700;
}
.check input{width:18px;min-height:18px;accent-color:var(--green)}
.needed{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  padding:10px 12px;
  border:1px solid rgba(184,137,47,.35);
  border-radius:7px;
  background:#fff8e8;
  margin-top:10px;
}
.needed b{font-size:1.35rem;color:#7d5a16}
.message{
  display:none;
  margin-top:10px;
  padding:9px 10px;
  border-radius:6px;
  border:1px solid rgba(163,59,50,.25);
  background:#fff1ef;
  color:var(--red);
  font-size:.88rem;
}
.message.show{display:block}
.preview{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
}
.player-count-2 .preview{grid-template-columns:repeat(2,minmax(0,1fr))}
.preview-card{
  border:1px solid var(--line);
  border-radius:7px;
  background:#fff;
  padding:10px;
  text-align:center;
}
.preview-card .name{font-size:.82rem;color:var(--muted);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-card .total{font-size:1.55rem;font-weight:900;margin-top:3px}
.positive{color:var(--green)}
.negative{color:var(--red)}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.actions .btn.primary{flex:1 1 180px}
.winner{
  display:none;
  border:1px solid rgba(184,137,47,.4);
  background:#fff6df;
  border-radius:8px;
  padding:12px;
  font-weight:900;
  color:#725111;
}
.winner.show{display:block}
.score-sheet{overflow:hidden;border:1px solid var(--line);border-radius:8px;background:#fff}
.score-sheet-head{
  display:grid;
  grid-template-columns:132px minmax(0,1fr) 76px;
  background:#f8f5ee;
  border-bottom:1px solid var(--line);
}
.score-sheet-players{
  display:grid;
  grid-template-columns:70px repeat(var(--players),minmax(0,1fr));
}
.score-round{
  display:grid;
  grid-template-columns:132px minmax(0,1fr) 76px;
  border-bottom:1px solid var(--line);
  background:#fff;
}
.score-round:last-child{border-bottom:0}
.round-info{
  padding:6px 8px;
  border-right:1px solid var(--line);
  background:#fbf8f1;
}
.round-no{font-size:1rem;font-weight:900;line-height:1}
.round-meta{margin-top:4px;color:var(--muted);font-size:.72rem;line-height:1.22}
.round-meta strong{display:block;color:var(--ink);font-size:.8rem}
.score-lines{
  display:grid;
  grid-template-columns:70px repeat(var(--players),minmax(0,1fr));
}
.sheet-head,.sheet-label,.sheet-cell{
  min-height:26px;
  padding:4px 7px;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.score-lines > :nth-last-child(-n + 4),
.score-sheet-players > *{border-bottom:0}
.player-count-2 .score-lines > :nth-last-child(-n + 3){border-bottom:0}
.sheet-head{
  color:#4a453d;
  background:#fbf8f1;
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.06em;
  overflow:hidden;
  text-align:center;
  text-overflow:ellipsis;
  text-transform:uppercase;
  white-space:nowrap;
}
.sheet-label{
  color:var(--muted);
  background:#fbf8f1;
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.sheet-cell{text-align:center;font-weight:800}
.sheet-cell.total{font-size:1rem;font-weight:900}
.sheet-actions{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:4px 6px;
}
.sheet-actions .btn{min-height:28px;padding:4px 9px}
.empty{
  padding:34px 16px;
  text-align:center;
  color:var(--muted);
  border:1px dashed var(--line);
  border-radius:8px;
  background:rgba(255,255,255,.45);
}
.file-input{display:none}
@media(max-width:900px){
  .top,.layout,.settings{grid-template-columns:1fr}
  .toolbar{justify-content:flex-start}
}
@media(max-width:620px){
  .wrap{padding:12px}
  .form-grid,.score-grid,.player-count-2 .score-grid,.preview,.player-count-2 .preview{grid-template-columns:1fr}
  .score-matrix{grid-template-columns:64px repeat(3,minmax(54px,1fr))}
  .player-count-2 .score-matrix{grid-template-columns:64px repeat(2,minmax(70px,1fr))}
  .score-sheet-head,.score-round{grid-template-columns:1fr}
  .score-sheet-head > div:first-child,.score-sheet-head > div:last-child{display:none}
  .round-info{border-right:0;border-bottom:1px solid var(--line)}
  .sheet-actions{justify-content:flex-end;border-top:1px solid var(--line)}
  .round-head{align-items:flex-start;flex-direction:column}
}
@media print{
  body{background:#fff}
  .wrap{max-width:none;padding:0}
  .toolbar,.actions,.settings-panel,.message,.sheet-actions{display:none}
  .panel{box-shadow:none}
  .layout{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap" id="app">
  <header class="top">
    <div class="brand">
      <h1>Pinochle Score Keeper</h1>
      <p id="saveState">Loading...</p>
    </div>
    <div class="toolbar">
      <button class="btn" id="printBtn" type="button">Print</button>
      <button class="btn" id="exportBtn" type="button">Export</button>
      <button class="btn" id="importBtn" type="button">Import</button>
      <button class="btn warn" id="resetBtn" type="button">New Game</button>
      <input class="file-input" id="importFile" type="file" accept="application/json,.json">
    </div>
  </header>

  <main class="layout">
    <section class="stack">
      <div class="panel section settings-panel">
        <div class="settings">
          <div class="field">
            <label for="gameTitle">Game Name</label>
            <input id="gameTitle" type="text" maxlength="48">
          </div>
          <div class="field">
            <span class="label">Players/Teams</span>
            <div class="seg" id="playerCount" aria-label="Players or teams">
              <button type="button" data-count="2">2</button>
              <button type="button" data-count="3">3</button>
            </div>
          </div>
          <div class="field">
            <label for="targetScore">Playing To</label>
            <input id="targetScore" type="number" min="1" step="1">
          </div>
        </div>
        <div class="divider"></div>
        <div class="score-grid" id="nameGrid"></div>
      </div>

      <form class="panel section" id="roundForm">
        <div class="round-head">
          <h2 id="roundTitle">Round</h2>
          <span class="save-state" id="editState"></span>
        </div>

        <div class="form-grid">
          <div class="field">
            <label for="dealer">Dealer</label>
            <select id="dealer"></select>
          </div>
          <div class="field">
            <label for="bidder">Bidder</label>
            <select id="bidder"></select>
          </div>
          <div class="field">
            <label for="bid">Bid</label>
            <input id="bid" type="number" min="0" step="1" placeholder="25">
          </div>
        </div>

        <div class="form-grid" style="margin-top:10px">
          <div class="field">
            <label for="trump">Trump</label>
            <select id="trump">
              <option value="">Select trump</option>
              <option>Spades</option>
              <option>Hearts</option>
              <option>Clubs</option>
              <option>Diamonds</option>
            </select>
          </div>
          <div class="field">
            <span class="label">Round State</span>
            <label class="check">
              <input id="thrown" type="checkbox">
              Bidder conceded
            </label>
          </div>
        </div>

        <div class="needed" id="neededBox">
          <span id="neededLabel">Needed</span>
          <b id="neededValue">0</b>
        </div>

        <div class="divider"></div>
        <h3 class="section-title">Scores</h3>
        <div class="score-matrix" id="scoreMatrix"></div>

        <div class="divider"></div>
        <h3 class="section-title">Round Preview</h3>
        <div class="preview" id="previewGrid"></div>
        <div class="message" id="formMessage"></div>

        <div class="actions">
          <button class="btn primary" id="submitRound" type="submit">Add Round</button>
          <button class="btn ghost" id="cancelEdit" type="button">Cancel Edit</button>
          <button class="btn ghost" id="clearRound" type="button">Clear Round</button>
        </div>
      </form>
    </section>

    <section class="stack">
      <div class="winner" id="winnerBox"></div>
      <div class="panel section">
        <h2 class="section-title">Running Tally</h2>
        <div id="history"></div>
      </div>
    </section>
  </main>
</div>

<script>
const STORE_KEY = 'pinochleScorekeeper.v2';
const LEGACY_KEY = 'pinochleGame';
const MAX_PLAYERS = 3;
const TRICK_TOTAL = 25;
const COLORS = ['#2f684d','#2f5f8c','#b8892f'];

let state = loadState();
let saveTimer = 0;
let autoTrickIndex = null;

function emptyRound(dealer){
  return {
    dealer: clampPlayer(dealer ?? 0),
    bidder: null,
    bid: null,
    trump: '',
    thrown: false,
    meld: Array(MAX_PLAYERS).fill(null),
    tricks: Array(MAX_PLAYERS).fill(null)
  };
}

function defaultState(){
  return {
    version: 2,
    title: 'Game Night',
    playerCount: 3,
    targetScore: 150,
    players: ['Player 1','Player 2','Player 3'],
    rounds: [],
    editingIndex: null,
    draft: emptyRound(0)
  };
}

function loadState(){
  const saved = readJson(STORE_KEY);
  if(saved) return normalizeState(saved);

  const legacy = readJson(LEGACY_KEY);
  if(legacy) return normalizeState(migrateLegacy(legacy));

  return defaultState();
}

function readJson(key){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  }catch(error){
    return null;
  }
}

function saveNow(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    setSaveState('Saved ' + new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}));
  }catch(error){
    setSaveState('Saved for this tab');
  }
}

function scheduleSave(){
  setSaveState('Saving...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNow, 120);
}

function setSaveState(text){
  document.getElementById('saveState').textContent = text;
}

function migrateLegacy(legacy){
  const players = Array.from({length:MAX_PLAYERS},(_,i)=>{
    const player = legacy.players?.[i];
    return String(player?.name || player || 'Player ' + (i+1));
  });
  const rounds = Array.isArray(legacy.history) ? legacy.history.map(round => normalizeRound({
    dealer: round.dealer,
    bidder: round.bidder,
    bid: round.bid,
    trump: round.trump,
    thrown: !!round.handThrown,
    meld: round.meld,
    tricks: round.tricks
  })) : [];

  return {
    ...defaultState(),
    title: 'Game Night',
    playerCount: 3,
    targetScore: numberOr(legacy.winningScore, 150),
    players,
    rounds,
    draft: emptyRound(numberOr(legacy.dealer, nextDealerFrom(rounds, 3)))
  };
}

function normalizeState(next){
  const base = defaultState();
  next = {...base, ...next};
  next.version = 2;
  next.playerCount = Math.min(MAX_PLAYERS, Math.max(2, numberOr(next.playerCount, 3)));
  next.targetScore = Math.max(1, numberOr(next.targetScore ?? next.winningScore, 150));
  next.players = Array.from({length:MAX_PLAYERS},(_,i)=>String(next.players?.[i] || base.players[i]));
  next.rounds = Array.isArray(next.rounds) ? next.rounds.map(normalizeRound) : [];
  next.editingIndex = Number.isInteger(next.editingIndex) ? next.editingIndex : null;
  if(next.editingIndex !== null && (next.editingIndex < 0 || next.editingIndex >= next.rounds.length)){
    next.editingIndex = null;
  }
  next.draft = normalizeRound(next.draft || emptyRound(nextDealerFrom(next.rounds, next.playerCount)));
  normalizeForPlayerCount(next);
  return next;
}

function normalizeForPlayerCount(model){
  model.rounds.forEach(round => {
    round.dealer = clampPlayer(round.dealer, model.playerCount);
    round.bidder = round.bidder === null ? null : clampPlayer(round.bidder, model.playerCount);
  });
  model.draft.dealer = clampPlayer(model.draft.dealer, model.playerCount);
  if(model.draft.bidder !== null) model.draft.bidder = clampPlayer(model.draft.bidder, model.playerCount);
}

function normalizeRound(round){
  const next = emptyRound(round?.dealer ?? 0);
  next.bidder = round?.bidder === null || round?.bidder === undefined ? null : clampPlayer(round.bidder);
  next.bid = nullableNumber(round?.bid);
  next.trump = String(round?.trump || '');
  next.thrown = !!round?.thrown || !!round?.handThrown;
  next.meld = Array.from({length:MAX_PLAYERS},(_,i)=>nullableNumber(round?.meld?.[i]));
  next.tricks = Array.from({length:MAX_PLAYERS},(_,i)=>nullableNumber(round?.tricks?.[i]));
  if(next.thrown) next.tricks = Array(MAX_PLAYERS).fill(null);
  return next;
}

function visiblePlayers(){
  return Array.from({length:state.playerCount},(_,i)=>i);
}

function clampPlayer(value, count){
  const limit = count || MAX_PLAYERS;
  return Math.min(limit - 1, Math.max(0, numberOr(value, 0)));
}

function nullableNumber(value){
  if(value === '' || value === null || value === undefined) return null;
  const number = Number(value);
  return Number.isFinite(number) ? Math.max(0, number) : null;
}

function numberOr(value, fallback){
  const number = Number(value);
  return Number.isFinite(number) ? number : fallback;
}

function format(value){
  const number = numberOr(value, 0);
  return number.toLocaleString();
}

function signed(value){
  return value > 0 ? '+' + format(value) : format(value);
}

function nextDealerFrom(rounds, playerCount){
  if(!rounds.length) return 0;
  return (clampPlayer(rounds[rounds.length - 1].dealer, playerCount) + 1) % playerCount;
}

function currentTotals(round){
  const totals = Array(MAX_PLAYERS).fill(0);
  const bid = numberOr(round.bid, 0);
  const bidder = round.bidder;
  const visible = visiblePlayers();

  if(round.thrown){
    visible.forEach(i => {
      totals[i] = i === bidder ? -bid : numberOr(round.meld[i], 0);
    });
    return totals;
  }

  const shutout = visible.find(i => numberOr(round.tricks[i], 0) === TRICK_TOTAL);
  const bidMade = isBidMade(round);

  visible.forEach(i => {
    const meld = numberOr(round.meld[i], 0);
    const tricks = numberOr(round.tricks[i], 0);
    if(!bidMade && i === bidder){
      totals[i] = -bid;
    }else if(shutout !== undefined){
      totals[i] = i === shutout ? meld + tricks : tricks;
    }else if(tricks === 0){
      totals[i] = 0;
    }else{
      totals[i] = meld + tricks;
    }
  });
  return totals;
}

function isBidMade(round){
  if(round.thrown || round.bidder === null) return false;
  const tricks = numberOr(round.tricks[round.bidder], 0);
  if(tricks <= 0) return false;
  return numberOr(round.meld[round.bidder], 0) + tricks >= numberOr(round.bid, 0);
}

function cumulativeTotals(throughIndex){
  const totals = Array(MAX_PLAYERS).fill(0);
  const end = throughIndex === undefined ? state.rounds.length - 1 : throughIndex;
  for(let r=0; r<=end; r++){
    const roundTotals = currentTotals(state.rounds[r]);
    visiblePlayers().forEach(i => totals[i] += roundTotals[i]);
  }
  return totals;
}

function winnerIndex(){
  const totals = cumulativeTotals();
  return visiblePlayers().find(i => totals[i] >= state.targetScore);
}

function validateRound(round){
  if(round.bidder === null) return 'Select a bidder.';
  if(!numberOr(round.bid, 0)) return 'Enter the bid.';
  if(round.thrown) return '';

  const visible = visiblePlayers();
  const missing = visible.some(i => round.tricks[i] === null);
  if(missing) return 'Enter trick points for each player/team.';

  const sum = visible.reduce((total,i)=>total + numberOr(round.tricks[i], 0), 0);
  if(sum !== TRICK_TOTAL) return 'Trick points must total ' + TRICK_TOTAL + '. Current total is ' + sum + '.';

  return '';
}

function render(){
  document.getElementById('app').classList.toggle('player-count-2', state.playerCount === 2);
  document.getElementById('gameTitle').value = state.title;
  document.getElementById('targetScore').value = state.targetScore;
  renderPlayerCount();
  renderNameGrid();
  renderRoundForm();
  renderHistory();
  renderWinner();
}

function renderPlayerCount(){
  document.querySelectorAll('#playerCount button').forEach(button=>{
    button.classList.toggle('active', Number(button.dataset.count) === state.playerCount);
  });
}

function renderNameGrid(){
  const grid = document.getElementById('nameGrid');
  grid.innerHTML = '';
  visiblePlayers().forEach(i=>{
    const field = document.createElement('div');
    field.className = 'field';
    field.innerHTML = '<label for="playerName' + i + '">Name ' + (i+1) + '</label>';
    const input = document.createElement('input');
    input.id = 'playerName' + i;
    input.type = 'text';
    input.maxLength = 24;
    input.value = state.players[i];
    input.style.borderLeft = '5px solid ' + COLORS[i];
    input.addEventListener('input',()=>{
      state.players[i] = input.value;
      syncPlayerSelects();
      renderScoreMatrix();
      renderHistory();
      renderPreview();
      scheduleSave();
    });
    field.appendChild(input);
    grid.appendChild(field);
  });
}

function renderRoundForm(){
  document.getElementById('roundTitle').textContent = state.editingIndex === null ? 'Round ' + (state.rounds.length + 1) : 'Round ' + (state.editingIndex + 1);
  document.getElementById('editState').textContent = state.editingIndex === null ? '' : 'Editing';
  document.getElementById('submitRound').textContent = state.editingIndex === null ? 'Add Round' : 'Save Round';
  document.getElementById('cancelEdit').style.display = state.editingIndex === null ? 'none' : '';

  syncPlayerSelects();
  document.getElementById('bid').value = state.draft.bid ?? '';
  document.getElementById('trump').value = state.draft.trump || '';
  document.getElementById('thrown').checked = !!state.draft.thrown;
  renderScoreMatrix();
  renderNeeded();
  renderPreview();
  setMessage('');
}

function syncPlayerSelects(){
  const dealer = document.getElementById('dealer');
  const bidder = document.getElementById('bidder');
  const dealerValue = String(clampPlayer(state.draft.dealer, state.playerCount));
  const bidderValue = state.draft.bidder === null ? '' : String(clampPlayer(state.draft.bidder, state.playerCount));

  dealer.innerHTML = '';
  bidder.innerHTML = '<option value="">Select bidder</option>';
  visiblePlayers().forEach(i=>{
    const dealerOption = new Option(state.players[i] || 'Player ' + (i+1), String(i));
    const bidderOption = new Option(state.players[i] || 'Player ' + (i+1), String(i));
    dealer.add(dealerOption);
    bidder.add(bidderOption);
  });
  dealer.value = dealerValue;
  bidder.value = bidderValue;
}

function renderScoreMatrix(){
  const grid = document.getElementById('scoreMatrix');
  grid.innerHTML = '<div></div>';

  visiblePlayers().forEach(i=>{
    const head = document.createElement('div');
    head.className = 'matrix-head';
    head.textContent = state.players[i] || 'Player ' + (i+1);
    grid.appendChild(head);
  });

  appendScoreRow(grid, 'Meld', 'meld');
  appendScoreRow(grid, 'Tricks', 'tricks');
}

function appendScoreRow(grid, label, key){
  const rowLabel = document.createElement('div');
  rowLabel.className = 'matrix-label';
  rowLabel.textContent = label;
  grid.appendChild(rowLabel);

  visiblePlayers().forEach(i=>{
    const input = document.createElement('input');
    input.type = 'number';
    input.step = '1';
    input.min = '0';
    input.value = state.draft[key][i] ?? '';
    input.placeholder = '0';
    input.disabled = key === 'tricks' && state.draft.thrown;
    input.setAttribute('aria-label', label + ' for ' + (state.players[i] || 'Player ' + (i+1)));
    input.addEventListener('input',()=>{
      if(key === 'tricks') setDraftTrick(i, input.value);
      else state.draft.meld[i] = nullableNumber(input.value);
      renderNeeded();
      renderPreview();
      scheduleSave();
    });
    grid.appendChild(input);
  });
}

function setDraftTrick(index, value){
  const tricks = state.draft.tricks;
  tricks[index] = nullableNumber(value);

  if(autoTrickIndex === index) autoTrickIndex = null;
  if(tricks[index] === null && autoTrickIndex !== null){
    tricks[autoTrickIndex] = null;
    autoTrickIndex = null;
  }

  let target = autoTrickIndex;
  const visible = visiblePlayers();
  const empty = visible.filter(i => tricks[i] === null);
  if(target === null || target === index){
    target = empty.length === 1 ? empty[0] : null;
  }

  if(target !== null && target !== index){
    const others = visible.filter(i => i !== target);
    if(others.every(i => tricks[i] !== null)){
      const sum = others.reduce((total,i)=>total + numberOr(tricks[i], 0), 0);
      tricks[target] = Math.max(0, TRICK_TOTAL - sum);
      autoTrickIndex = target;
    }
  }

  renderScoreMatrix();
}

function renderNeeded(){
  const box = document.getElementById('neededBox');
  const bidder = state.draft.bidder;
  if(bidder === null || !numberOr(state.draft.bid, 0)){
    box.style.display = 'none';
    return;
  }
  box.style.display = '';
  const needed = Math.max(0, numberOr(state.draft.bid, 0) - numberOr(state.draft.meld[bidder], 0));
  document.getElementById('neededLabel').textContent = (state.players[bidder] || 'Bidder') + ' needs';
  document.getElementById('neededValue').textContent = format(needed);
}

function renderPreview(){
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';
  const totals = currentTotals(state.draft);
  visiblePlayers().forEach(i=>{
    const card = document.createElement('div');
    const value = totals[i];
    card.className = 'preview-card';
    card.innerHTML = '<div class="name">' + escapeHtml(state.players[i] || 'Player ' + (i+1)) + '</div>' +
      '<div class="total ' + (value < 0 ? 'negative' : 'positive') + '">' + signed(value) + '</div>';
    grid.appendChild(card);
  });
}

function renderWinner(){
  const winner = winnerIndex();
  const box = document.getElementById('winnerBox');
  if(winner === undefined){
    box.classList.remove('show');
    box.textContent = '';
  }else{
    box.classList.add('show');
    box.textContent = (state.players[winner] || 'Player ' + (winner + 1)) + ' has reached ' + state.targetScore + '.';
  }
}

function renderHistory(){
  const target = document.getElementById('history');
  if(!state.rounds.length){
    target.innerHTML = '<div class="empty">No rounds yet.</div>';
    return;
  }

  const players = visiblePlayers();
  let html = '<div class="score-sheet">';
  html += '<div class="score-sheet-head"><div></div><div class="score-sheet-players" style="--players:' + players.length + '"><div></div>';
  players.forEach(i=>{
    html += '<div class="sheet-head">' + escapeHtml(state.players[i] || 'Player ' + (i+1)) + '</div>';
  });
  html += '</div><div></div></div>';

  state.rounds.forEach((round, roundIndex)=>{
    const roundTotals = currentTotals(round);
    const runningTotals = cumulativeTotals(roundIndex);
    const bidderName = round.bidder === null ? '-' : state.players[round.bidder];
    const bidMade = isBidMade(round);
    const bidderSet = !round.thrown && !bidMade;
    const status = round.thrown ? 'Conceded' : (bidMade ? 'Made' : 'Set');
    html += '<div class="score-round">';
    html += '<div class="round-info"><div class="round-no">Round ' + (roundIndex + 1) + '</div>';
    html += '<div class="round-meta"><strong>' + escapeHtml(bidderName || '-') + ' bid ' + format(round.bid || 0) + '</strong>';
    html += 'Dealer: ' + escapeHtml(state.players[round.dealer] || '-') + '<br>';
    html += 'Trump: ' + escapeHtml(round.trump || '-') + '<br>';
    html += 'Result: ' + status + '</div></div>';

    html += '<div class="score-lines" style="--players:' + players.length + '">';
    html += '<div class="sheet-label">Meld</div>';
    players.forEach(i=>{
      const shownMeld = (round.thrown || bidderSet) && i === round.bidder ? -numberOr(round.bid, 0) : numberOr(round.meld[i], 0);
      html += '<div class="sheet-cell ' + (shownMeld < 0 ? 'negative' : '') + '">' + (shownMeld < 0 ? signed(shownMeld) : format(shownMeld)) + '</div>';
    });
    html += '<div class="sheet-label">Tricks</div>';
    players.forEach(i=>{
      const shownTricks = (round.thrown || (bidderSet && i === round.bidder)) ? '-' : format(round.tricks[i] || 0);
      html += '<div class="sheet-cell">' + shownTricks + '</div>';
    });
    html += '<div class="sheet-label">Total</div>';
    players.forEach(i=>{
      html += '<div class="sheet-cell total ' + (runningTotals[i] < 0 ? 'negative' : 'positive') + '">' + signed(runningTotals[i]) + '</div>';
    });
    html += '</div>';
    html += '<div class="sheet-actions"><button class="btn" type="button" data-edit="' + roundIndex + '">Edit</button></div>';
    html += '</div>';
  });

  html += '</div>';
  target.innerHTML = html;
}

function setMessage(text){
  const message = document.getElementById('formMessage');
  message.textContent = text;
  message.classList.toggle('show', !!text);
}

function saveDraft(){
  const error = validateRound(state.draft);
  if(error){
    setMessage(error);
    return;
  }

  const round = normalizeRound(state.draft);
  if(state.editingIndex === null){
    state.rounds.push(round);
  }else{
    state.rounds[state.editingIndex] = round;
    state.editingIndex = null;
  }

  state.draft = emptyRound(nextDealerFrom(state.rounds, state.playerCount));
  autoTrickIndex = null;
  render();
  scheduleSave();
}

function clearDraft(){
  state.draft = emptyRound(state.editingIndex === null ? nextDealerFrom(state.rounds, state.playerCount) : state.draft.dealer);
  autoTrickIndex = null;
  renderRoundForm();
  scheduleSave();
}

function cancelEdit(){
  state.editingIndex = null;
  state.draft = emptyRound(nextDealerFrom(state.rounds, state.playerCount));
  autoTrickIndex = null;
  render();
  scheduleSave();
}

function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  link.href = url;
  link.download = 'pinochle-scorekeeper-' + stamp + '.json';
  link.click();
  URL.revokeObjectURL(url);
}

function importData(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      state = normalizeState(JSON.parse(reader.result));
      autoTrickIndex = null;
      render();
      saveNow();
    }catch(error){
      setMessage('That backup could not be imported.');
    }
  };
  reader.readAsText(file);
}

function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, char => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[char]));
}

document.getElementById('gameTitle').addEventListener('input',event=>{
  state.title = event.target.value;
  scheduleSave();
});

document.getElementById('targetScore').addEventListener('input',event=>{
  state.targetScore = Math.max(1, numberOr(event.target.value, 150));
  renderWinner();
  scheduleSave();
});

document.getElementById('playerCount').addEventListener('click',event=>{
  const button = event.target.closest('button[data-count]');
  if(!button) return;
  state.playerCount = Number(button.dataset.count);
  normalizeForPlayerCount(state);
  if(state.editingIndex === null) state.draft.dealer = nextDealerFrom(state.rounds, state.playerCount);
  autoTrickIndex = null;
  render();
  scheduleSave();
});

document.getElementById('dealer').addEventListener('change',event=>{
  state.draft.dealer = Number(event.target.value);
  scheduleSave();
});

document.getElementById('bidder').addEventListener('change',event=>{
  state.draft.bidder = event.target.value === '' ? null : Number(event.target.value);
  renderNeeded();
  renderPreview();
  scheduleSave();
});

document.getElementById('bid').addEventListener('input',event=>{
  state.draft.bid = nullableNumber(event.target.value);
  renderNeeded();
  renderPreview();
  scheduleSave();
});

document.getElementById('trump').addEventListener('change',event=>{
  state.draft.trump = event.target.value;
  scheduleSave();
});

document.getElementById('thrown').addEventListener('change',event=>{
  state.draft.thrown = event.target.checked;
  if(state.draft.thrown) state.draft.tricks = Array(MAX_PLAYERS).fill(null);
  autoTrickIndex = null;
  renderRoundForm();
  scheduleSave();
});

document.getElementById('roundForm').addEventListener('submit',event=>{
  event.preventDefault();
  saveDraft();
});

document.getElementById('clearRound').addEventListener('click',clearDraft);
document.getElementById('cancelEdit').addEventListener('click',cancelEdit);
document.getElementById('printBtn').addEventListener('click',()=>window.print());
document.getElementById('exportBtn').addEventListener('click',exportData);
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',event=>{
  const file = event.target.files[0];
  if(file) importData(file);
  event.target.value = '';
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm('Start a new Pinochle game?')) return;
  state = defaultState();
  autoTrickIndex = null;
  render();
  saveNow();
});

document.getElementById('history').addEventListener('click',event=>{
  const button = event.target.closest('button[data-edit]');
  if(!button) return;
  const index = Number(button.dataset.edit);
  state.editingIndex = index;
  state.draft = normalizeRound(state.rounds[index]);
  autoTrickIndex = null;
  render();
  document.getElementById('roundForm').scrollIntoView({behavior:'smooth', block:'start'});
  scheduleSave();
});

render();
saveNow();
</script>
</body>
</html>
